<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Live Footprint and Order Flow charts for the NSE. Spot volume imbalances, trapped traders, and exact execution prices to refine your trading edge.">
<title>Order Flow & Footprint Charts | Nifty</title>
<link rel="icon" type="image/png" href="optionchain_fevicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
    :root { 
        /* 🟢 Dark Theme (Refined Obsidian/Slate) */
        --bg: #0b0f19; 
        --card: #131b2c; 
        --section: #1e293b; 
        --border: #334155; 
        --text: #f8fafc; 
        --muted: #94a3b8; 
        --accent: #3b82f6; 
        --gold: #fbbf24; 
        --green: #22c55e; 
        --red: #ef4444; 
    }

    
    /* 🟢 Flex Layout prevents overlapping and handles screen sizes automatically */
    body { margin: 0; padding: 0; 
          background-color: var(--bg); 
          color: var(--text); 
          overflow: hidden; 
          font-family: 'Inter', 
          sans-serif; user-select: none; 
          display: flex; 
          flex-direction: column; 
          height: 100dvh; 
          width: 100vw; 
          /* 2. DISABLE TEXT SELECTION (HIGHLIGHTING) */
    -webkit-user-select: none; /* Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE10+/Edge */
    user-select: none;         /* Standard */
         }
    
    /* --- 1. CLEANED HEADER --- */
    header { 
        height: 52px; background: var(--card); border-bottom: 1px solid var(--border); 
        display: flex; justify-content: space-between; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .logo { font-weight: 900; font-size: 18px; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;}
    .logo span { color: var(--accent); }
    
    .header-prices { display: flex; align-items: center; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
    .price-box { display: flex; align-items: center; gap: 8px; }
    .price-label { color: var(--muted); font-size: 10px; }
    .price-val { color: var(--text); }
    .price-val.fut { color: var(--gold); }

/* --- 2. WORKSPACE & LEFT NAV --- */
    .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
    
.left-nav {
        /* 🟢 CHANGED: Removed overflow-x: hidden so the panel can escape the box! */
        width: 52px; min-width: 52px; max-width: 250px;
        background: var(--card); border-right: 1px solid var(--border); 
        display: flex; flex-direction: column; align-items: center; padding-top: 16px; gap: 12px; flex-shrink: 0; z-index: 20;
        /* No overflow rules here! */
    }
    
    /* 🟢 NEW: The Draggable Resizer Bar */
    .resizer-x {
        width: 4px; /* The hit-area for the mouse */
        background-color: transparent;
        cursor: col-resize; /* The left-right arrow cursor */
        position: relative;
        z-index: 30;
        transition: background-color 0.2s;
    }
    .resizer-x:hover, .resizer-x.is-resizing {
        background-color: var(--accent); /* Glows blue when hovering or dragging */
    }

    .tool-btn { 
        width: 36px; height: 36px; border-radius: 8px; background: transparent; border: 1px solid transparent; 
        color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; 
    }
    .tool-btn:hover { background: var(--section); color: var(--text); }
    .tool-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }

    /* --- 3. CHART CONTAINER --- */
    #chart-container { 
        flex: 1; position: relative; background: #0c0c0f; cursor: crosshair; 
        touch-action: none; /* 🟢 CRITICAL: Stops mobile browser from pulling-to-refresh when dragging chart */
    }
    canvas { display: block; width: 100%; height: 100%; }

   :root { 
        /* 🟢 Dark Theme (Refined Obsidian/Slate) */
        --bg: #0b0f19; 
        --card: #131b2c; 
        --section: #1e293b; 
        --border: #334155; 
        --text: #f8fafc; 
        --muted: #94a3b8; 
        --accent: #3b82f6; 
        --gold: #fbbf24; 
        --green: #22c55e; 
        --red: #ef4444; 
    }
    
    .light-theme {
        /* 🟢 Light Theme (Clean Paper/Silver) */
        --bg: #f8fafc;
        --card: #ffffff;
        --section: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --gold: #d97706;
        --green: #16a34a;
        --red: #dc2626;
    }

    /* --- SESSION STATS --- */
    .stats-panel {
        position: absolute; top: 15px; left: 135px; 
        /* Default Dark Theme background */
        background: rgba(19, 27, 44, 0.85); 
        border: 1px solid var(--border);
        border-radius: 8px; padding: 12px 15px; width: 180px;
        font-family: 'JetBrains Mono', monospace; font-size: 10px; z-index: 10;
        backdrop-filter: blur(10px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        pointer-events: none;
    }
    
    /* 🟢 NEW: Clean, flat styling for the light theme stats box */
    .light-theme .stats-panel {
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-label { color: var(--muted); }
    .stat-val { font-weight: 700; color: var(--text); }
    /* 🟢 LIGHT THEME VARIABLES */
    
    .light-theme {
        /* 🟢 Light Theme (Clean Paper/Silver) */
        --bg: #f8fafc;
        --card: #ffffff;
        --section: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --gold: #d97706;
        --green: #16a34a;
        --red: #dc2626;
    }
    /* 🟢 SETTINGS PANEL STYLES */
    .settings-panel {
        display: none; 
        position: absolute; 
        left: 60px; 
        bottom: 10px; /* Anchored to bottom since button is at bottom */
        background: var(--card); 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        width: 190px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        flex-direction: column; 
        z-index: 9999; 
    }
    .light-theme .settings-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .settings-header { padding: 10px 16px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--section); border-radius: 8px 8px 0 0; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.15s; }
    .settings-row:hover { background: var(--section); border-radius: 0 0 8px 8px; }
    .settings-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; transform: scale(1.2); }

  .hamburger-btn { display: none; background: transparent; border: none; color: var(--text); cursor: pointer; padding: 0; }

    /* --- 📱 MOBILE OPTIMIZATION --- */
    @media (max-width: 768px) {
        .hamburger-btn { display: flex; align-items: center; justify-content: center; }
        .logo { font-size: 15px; }
        .logo span { display: none; } /* Hide "Greek" word to save space */
        .header-prices { gap: 10px; font-size: 11px; flex-direction: column; align-items: flex-end; gap: 2px;}
        
        /* Turn Left Nav into an Off-Canvas Mobile Menu */
        .left-nav { 
            position: absolute; 
            left: -100%; 
            top: 0; 
            height: 100%; 
            width: 52px !important; 
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            padding-top: 15px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.8);
        }
        .light-theme .left-nav { box-shadow: 5px 0 25px rgba(0,0,0,0.1); }
        .left-nav.mobile-open { left: 0; }
        
        .resizer-x { display: none; } /* Disable manual dragging on mobile */
        .tool-btn { width: 32px; height: 32px; }
        .stats-panel { display: none !important; } /* Hide heavy stats on mobile */
    }
</style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <button class="hamburger-btn" onclick="toggleMobileNav(event)" title="Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>

<div class="workspace">
    <div class="left-nav" id="left-nav"><div class="resizer-x" id="resizer"></div>
        <button class="tool-btn active" title="Cursor">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg>
        </button>
        <button class="tool-btn" title="Measure">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21L3 3"></path><path d="M21 3v6"></path><path d="M21 3h-6"></path></svg>
        </button>

<div class="tool-btn" title="Historical Date" style="position: relative; cursor: pointer;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: relative; z-index: 1; pointer-events: none;">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>

            </svg>
            
            <input type="date" id="history-date" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;">
        </div>

        <div style="position: relative; margin-top: auto; margin-bottom: 10px;" id="settings-wrapper">
            <button class="tool-btn" id="btn-settings" onclick="toggleSettings(event)" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>            <div class="settings-panel" id="settings-panel">
                <div class="settings-header">General</div>
                <label class="settings-row">Light Theme <input type="checkbox" id="theme-cb" onchange="toggleTheme()"></label>

                <label class="settings-row">Session Stats <input type="checkbox" id="stats-cb" onchange="toggleComponent('stats-panel', this)" checked></label>

    <div id="chart-container">
        <canvas id="orderflowCanvas"></canvas>
        
        <div class="stats-panel" id="stats-panel">
            <div style="font-size: 9px; color: var(--accent); margin-bottom: 10px; font-weight: 800; letter-spacing: 0.5px;">SESSION STATS</div>
            <div class="stat-row"><span class="stat-label">VWAP</span><span class="stat-val" id="st-vwap">--</span></div>
            <div class="stat-row"><span class="stat-label">Cum Delta</span><span class="stat-val" id="st-delta">--</span></div>
            <div class="stat-row"><span class="stat-label">VPOC</span><span class="stat-val" id="st-vpoc" style="color: var(--gold);">--</span></div>

            <div style="height: 1px; background: var(--border); margin: 10px 0;"></div>
            
            <div class="stat-row"><span class="stat-label">OR High (15m)</span><span class="stat-val" id="st-orh" style="color: var(--green);">--</span></div>
            <div class="stat-row"><span class="stat-label">OR Low (15m)</span><span class="stat-val" id="st-orl" style="color: var(--red);">--</span></div>
        </div>

</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    
    const app = initializeApp({ apiKey: "AIzaSyCXycONZBbhKBo__PtazbQXJR9n44dmoGo", authDomain: "insideoptionchain.firebaseapp.com", projectId: "insideoptionchain" });
    const auth = getAuth(app);

    const canvas = document.getElementById('orderflowCanvas');
    const container = document.getElementById('chart-container');
    const ctx = canvas.getContext('2d');
    let width, height;

// ==========================================
    // 🟢 NEW: HORIZONTAL RESIZER LOGIC
    // ==========================================
    const resizer = document.getElementById('resizer');
    const leftNav = document.getElementById('left-nav');
    
    let isResizingWorkspace = false;

    resizer.addEventListener('mousedown', (e) => {
        isResizingWorkspace = true;
        resizer.classList.add('is-resizing');
        document.body.style.cursor = 'col-resize'; // Force the cursor everywhere while dragging
        e.preventDefault(); // Prevent text highlighting while dragging
    });

    window.addEventListener('mousemove', (e) => {
        if (!isResizingWorkspace) return;
        
        // Calculate the new width based on the mouse X position
        let newWidth = e.clientX;
        
        // Enforce the bounds (Min 52px, Max 250px)
        if (newWidth < 52) newWidth = 52;
        if (newWidth > 250) newWidth = 250;
        
        leftNav.style.width = `${newWidth}px`;
        
        // Immediately force the canvas to redraw to fill the new space
        resizeCanvas();
    });

    window.addEventListener('mouseup', () => {
        if (isResizingWorkspace) {
            isResizingWorkspace = false;
            resizer.classList.remove('is-resizing');
            document.body.style.cursor = 'default';
        }
    });
    // ==========================================
    

    // --- TOGGLES STATE ---
    let showVP = true;
    let showDOM = true;

    // --- UI & THEME TOGGLE LOGIC ---
  // 🟢 Mobile Nav Toggle
    window.toggleMobileNav = function(event) {
        if (event) event.stopPropagation();
        const nav = document.getElementById('left-nav');
        nav.classList.toggle('mobile-open');
    };
    
    window.toggleSettings = function(event) {
        if(event) event.stopPropagation();
        const panel = document.getElementById('settings-panel');
        const btn = document.getElementById('btn-settings');
        const isVisible = panel.style.display === 'flex';
        
        if (isVisible) {
            panel.style.display = 'none';
            btn.classList.remove('active');
        } else {
            panel.style.display = 'flex';
            btn.classList.add('active');
        }
    };

    window.toggleTheme = function() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('owl-theme', isLight ? 'light' : 'dark');
        renderCanvas(); 
    };

    window.toggleComponent = function(id, cb) {
        document.getElementById(id).style.display = cb.checked ? 'block' : 'none';
    };

    window.toggleVP = function(cb) {
        showVP = cb.checked;
        if (showVP) document.getElementById('stats-panel').style.left = '135px';
        else document.getElementById('stats-panel').style.left = '15px';
        renderCanvas();
    };

    window.toggleDOM = function(cb) {
        showDOM = cb.checked;
        renderCanvas();
    };

// Close settings and mobile nav when clicking outside
    document.addEventListener('click', function(event) {
        const panel = document.getElementById('settings-panel');
        const btn = document.getElementById('btn-settings');
        const nav = document.getElementById('left-nav');
        const hamburger = document.querySelector('.hamburger-btn');
        
        // Close Settings
        if (panel && panel.style.display === 'flex') {
            if (!panel.contains(event.target) && !btn.contains(event.target)) {
                panel.style.display = 'none';
                btn.classList.remove('active');
            }
        }
        
        // Close Mobile Menu
        if (nav && nav.classList.contains('mobile-open')) {
            if (!nav.contains(event.target) && (!hamburger || !hamburger.contains(event.target))) {
                nav.classList.remove('mobile-open');
            }
        }
    });

    // Check saved theme on load
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('owl-theme') === 'light') {
            document.body.classList.add('light-theme');
            const cb = document.getElementById('theme-cb');
            if (cb) cb.checked = true;
        }
        
        // Mobile layout defaults
        if(window.innerWidth <= 768) {
             document.getElementById('stats-cb').checked = false;
        }
    });

// --- CHART CONFIGURATION ---
    let COL_WIDTH = 110;       // 🟢 Slimmed down from 180
    const Y_AXIS_WIDTH = 60;   
    const VP_WIDTH = 120;      
    const X_AXIS_HEIGHT = 25;  // 🟢 Shrunk down! Now it only holds the time
    let GAP = 8;               // 🟢 Tighter gap between candles
    const TICK_SIZE = 1;     

  // --- CAMERA / INTERACTION STATE ---
    let offsetX = 0; 
    let offsetY = 0; 
    let priceScale = 25; 
    
    let isDraggingChart = false;
    let isDraggingYScale = false;
    let isDraggingXScale = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    
    let latestDataCache = {};
    let latestDomCache = { bids: {}, asks: {} }; 
    let volumeProfile = {};
    let sessionStats = {};

    function resizeCanvas() { 
        width = canvas.width = container.clientWidth; 
        height = canvas.height = container.clientHeight; 
        renderCanvas(); 
    }
    window.addEventListener('resize', resizeCanvas); 
    
    resizeCanvas();
    setTimeout(resizeCanvas, 100);

    // 🟢 UPGRADED: TV-Style Axis Hit Detection
    function handlePointerDown(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        
        if (x > width - Y_AXIS_WIDTH && y < height - X_AXIS_HEIGHT) {
            isDraggingYScale = true;
            document.body.style.cursor = 'ns-resize';
        } else if (y > height - X_AXIS_HEIGHT && x < width - Y_AXIS_WIDTH) {
            isDraggingXScale = true;
            document.body.style.cursor = 'ew-resize';
        } else {
            isDraggingChart = true;
            document.body.style.cursor = 'grabbing';
        }
        
        lastMouseX = clientX;
        lastMouseY = clientY;
    }

    function handlePointerMove(e) {
        if (!isDraggingChart && !isDraggingYScale && !isDraggingXScale) {
            // Hover cursors
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            if (x > width - Y_AXIS_WIDTH && y < height - X_AXIS_HEIGHT) canvas.style.cursor = 'ns-resize';
            else if (y > height - X_AXIS_HEIGHT && x < width - Y_AXIS_WIDTH) canvas.style.cursor = 'ew-resize';
            else canvas.style.cursor = 'crosshair';
            return;
        }
        
        if (e.cancelable) e.preventDefault(); 

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const dx = clientX - lastMouseX;
        const dy = clientY - lastMouseY;
        
        // 🟢 UPGRADED: Exponential Scaling Math
        if (isDraggingChart) {
            offsetX += dx;
            offsetY += dy;
        } else if (isDraggingYScale) {
            // Dragging down stretches the Y axis
            priceScale *= (1 - dy * 0.005);
            priceScale = Math.max(2, Math.min(priceScale, 150));
        } else if (isDraggingXScale) {
            // Dragging right stretches the X axis
            COL_WIDTH *= (1 + dx * 0.005);
            COL_WIDTH = Math.max(40, Math.min(COL_WIDTH, 400));
            GAP = COL_WIDTH * (15/180); // Maintain aspect ratio of the gap
        }
        
        renderCanvas();
        lastMouseX = clientX;
        lastMouseY = clientY;
    }

    function handlePointerUp() { 
        isDraggingChart = false; 
        isDraggingYScale = false; 
        isDraggingXScale = false;
        document.body.style.cursor = 'default';
        canvas.style.cursor = 'crosshair';
    }

    // Scroll Wheel Zoom Support (Bonus)
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomFactor = 1 - e.deltaY * 0.002;
        if (e.ctrlKey || e.metaKey) {
            COL_WIDTH = Math.max(40, Math.min(COL_WIDTH * zoomFactor, 400));
            GAP = COL_WIDTH * (15/180);
        } else {
            priceScale = Math.max(2, Math.min(priceScale * zoomFactor, 150));
        }
        renderCanvas();
    }, { passive: false });

    canvas.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove, { passive: false });
    window.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('mouseleave', handlePointerUp);

    canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
    window.addEventListener('touchmove', handlePointerMove, { passive: false });
    window.addEventListener('touchend', handlePointerUp);
    window.addEventListener('touchcancel', handlePointerUp);

// --- DATA POLLING ---
    let isLiveMode = true;

    onAuthStateChanged(auth, async (user) => {
        if (!user) return window.location.href = "index.html";
        const token = await user.getIdToken();
        
        document.getElementById('history-date').addEventListener('change', async (e) => {
            const selectedDate = e.target.value;
            
            // 🟢 BULLETPROOF IST DATE GENERATOR
            const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

            if (!selectedDate || selectedDate === today) {
                isLiveMode = true;
                
                // 🟢 Force a clean UI refresh when jumping back to live mode
                latestDataCache = {};
                latestDomCache = { bids: {}, asks: {} };
                processSessionData();
                renderCanvas();
                
                return;
            }

            isLiveMode = false;
            try {
                const r = await fetch(`https://api.greekcalculator.in/api/historical-footprint?date=${selectedDate}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await r.json();
                
                latestDataCache = data.data || {};
                latestDomCache = { bids: {}, asks: {} }; 
                
                processSessionData(); 
                renderCanvas();
            } catch(err) { console.error("History fetch failed", err); }
        });
        setInterval(async () => {
            if (!isLiveMode) return; 
            
            try {
                const tResp = await fetch('https://api.greekcalculator.in/api/ticker-prices');
                const tData = await tResp.json();
                
                if (tData["NIFTY 50"]) document.getElementById('hdr-spot').innerText = tData["NIFTY 50"].ltp.toFixed(2);
                if (tData["NIFTY FUT"]) document.getElementById('hdr-fut').innerText = tData["NIFTY FUT"].ltp.toFixed(2); 

                const r = await fetch('https://api.greekcalculator.in/api/footprint', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await r.json();
                
                if (data.status === "success") {
                    latestDataCache = data.data;
                    if (data.dom) latestDomCache = data.dom;
                    processSessionData(); 
                    renderCanvas();
                }
            } catch(e) {}
        }, 2000);
    });

    function processSessionData() {
        volumeProfile = {};
        let totalVol = 0; let totalVolPrice = 0; let totalDelta = 0;

        const times = Object.keys(latestDataCache).sort();
        if(!times.length) return;

        let orHigh = -Infinity, orLow = Infinity;
        let ibHigh = -Infinity, ibLow = Infinity;

const parseTime = (t) => { 
            if (!t) return 0;
            const parts = t.split(':');
            if (parts.length < 2) return 0;
            return parseInt(parts[0]) * 60 + parseInt(parts[1]); 
        };
        const firstTimeMin = parseTime(times[0]) || (9 * 60 + 15); 

        times.forEach(t => {
            if (!latestDataCache[t]) return;
            
            const min = parseTime(t);
            const isOR = min < firstTimeMin + 15; 
            const isIB = min < firstTimeMin + 60; 

            const matrix = latestDataCache[t].volumes || latestDataCache[t] || {};
            
            Object.keys(matrix).forEach(pStr => {
                const p = parseFloat(pStr);
                const cell = matrix[pStr];
                const vol = cell.buy_vol + cell.sell_vol;
                const delta = cell.buy_vol - cell.sell_vol;

                if (!volumeProfile[p]) volumeProfile[p] = 0;
                volumeProfile[p] += vol;
                
                totalVol += vol; totalVolPrice += p * vol; totalDelta += delta;

                if(isOR) { if(p > orHigh) orHigh = p; if(p < orLow) orLow = p; }
                if(isIB) { if(p > ibHigh) ibHigh = p; if(p < ibLow) ibLow = p; }
            });
        });

        let vpoc = 0; let maxVPVol = 0;
        Object.keys(volumeProfile).forEach(pStr => {
            if (volumeProfile[pStr] > maxVPVol) { maxVPVol = volumeProfile[pStr]; vpoc = parseFloat(pStr); }
        });

        let targetVol = totalVol * 0.70; let currentVol = volumeProfile[vpoc] || 0;
        let vah = vpoc; let val = vpoc;
        let up = vpoc + TICK_SIZE; let down = vpoc - TICK_SIZE;

        while (currentVol < targetVol) {
            let upVol = volumeProfile[up] || 0; let downVol = volumeProfile[down] || 0;
            if (upVol === 0 && downVol === 0) break;
            if (upVol >= downVol) { currentVol += upVol; vah = up; up += TICK_SIZE; } 
            else { currentVol += downVol; val = down; down -= TICK_SIZE; }
        }

        sessionStats = {
            vwap: totalVolPrice / totalVol, cumDelta: totalDelta, vpoc, vah, val, maxVPVol,
            orHigh: orHigh === -Infinity ? '--' : orHigh, orLow: orLow === Infinity ? '--' : orLow,
            ibHigh: ibHigh === -Infinity ? '--' : ibHigh, ibLow: ibLow === Infinity ? '--' : ibLow
        };

        const statsPanel = document.getElementById('stats-panel');
        const statsCb = document.getElementById('stats-cb');
        if (window.innerWidth <= 768 && statsCb.checked === false) {
             statsPanel.style.display = 'none';
        } else if (statsCb.checked) {
             statsPanel.style.display = 'block';
        }
        
        document.getElementById('st-vwap').innerText = isNaN(sessionStats.vwap) ? '--' : sessionStats.vwap.toFixed(2);
        
        const dEl = document.getElementById('st-delta');
        dEl.innerText = (totalDelta > 0 ? '+' : '') + totalDelta;
        dEl.style.color = totalDelta > 0 ? 'var(--green)' : 'var(--red)';
        
        document.getElementById('st-vpoc').innerText = sessionStats.vpoc;
        document.getElementById('st-va').innerText = `${sessionStats.vah} / ${sessionStats.val}`;
        document.getElementById('st-orh').innerText = sessionStats.orHigh;
        document.getElementById('st-orl').innerText = sessionStats.orLow;
    }

// --- CORE RENDERING ENGINE ---
    function renderCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        const isLight = document.body.classList.contains('light-theme');
        document.getElementById('chart-container').style.background = isLight ? '#f8fafc' : '#0c0c0f';

        const timeKeys = Object.keys(latestDataCache).sort();
        
        if (timeKeys.length === 0) {
            ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
            ctx.font = "600 14px 'Inter'";
            ctx.textAlign = "center";
            ctx.fillText("Waiting for Footprint Data... (Check Market Hours)", width / 2, height / 2);
            return;
        }

        let minPrice = Infinity, maxPrice = -Infinity;
        
        timeKeys.forEach(t => {
            const candle = latestDataCache[t];
            let cHigh = -Infinity;
            let cLow = Infinity;
            
            const prices = Object.keys(candle.volumes || {}).map(Number);
            if (prices.length > 0) {
                cHigh = Math.max(...prices);
                cLow = Math.min(...prices);
            }
            
            if (cHigh === -Infinity && candle.high > 0) cHigh = candle.high;
            if (cLow === Infinity && candle.low > 0) cLow = candle.low;
            
            if (cHigh !== -Infinity && cHigh > maxPrice) maxPrice = cHigh;
            if (cLow !== Infinity && cLow < minPrice) minPrice = cLow;
        });

        if (minPrice === Infinity || maxPrice === -Infinity) {
            minPrice = 22000;
            maxPrice = 22100;
        }

        const getPriceY = (price) => {
            const diffFromMin = price - minPrice;
            // 🟢 Adjusted padding to match the new smaller X-axis
            return height - X_AXIS_HEIGHT - 20 - (diffFromMin / TICK_SIZE * priceScale) + offsetY;
        };
        
        const priceAtTop = minPrice + ((height - X_AXIS_HEIGHT - 20 + offsetY) / priceScale) * TICK_SIZE;
        const priceAtBottom = minPrice + ((-20 + offsetY - height) / priceScale) * TICK_SIZE;
        
        const topBound = Math.max(priceAtTop, priceAtBottom);
        const botBound = Math.min(priceAtTop, priceAtBottom);

        let gridStep = TICK_SIZE;
        if (priceScale < 8) gridStep = TICK_SIZE * 10;      
        else if (priceScale < 15) gridStep = TICK_SIZE * 4; 
        else if (priceScale < 30) gridStep = TICK_SIZE * 2; 

        const startPrice = Math.floor(botBound / gridStep) * gridStep;
        const endPrice = Math.ceil(topBound / gridStep) * gridStep;

        ctx.strokeStyle = isLight ? '#e2e8f0' : '#1e1e24'; 
        ctx.lineWidth = 1; ctx.beginPath();
        for (let p = startPrice; p <= endPrice; p += gridStep) {
            const y = getPriceY(p);
            if (y > 0 && y < height - X_AXIS_HEIGHT) { ctx.moveTo(0, y); ctx.lineTo(width - Y_AXIS_WIDTH, y); }
        }
        ctx.stroke();

        let currentX = width - Y_AXIS_WIDTH - COL_WIDTH - GAP + offsetX;
        let cumulativeDelta = 0;

        for (let i = timeKeys.length - 1; i >= 0; i--) {
            if (currentX + COL_WIDTH < (showVP ? VP_WIDTH : 0)) break; 
            
            const timeKey = timeKeys[i];
            const candleData = latestDataCache[timeKey];
            const matrix = candleData.volumes || {}; 
            const prices = Object.keys(matrix).map(Number).sort((a,b) => b-a);
            
            let maxVol = 0, pocPrice = null, candleDelta = 0;
            let totalBuyVol = 0, totalSellVol = 0;
            
            prices.forEach(p => {
                const b = matrix[p].buy_vol, s = matrix[p].sell_vol;
                candleDelta += (b - s);
                totalBuyVol += b;
                totalSellVol += s;
                if (b+s > maxVol) { maxVol = b+s; pocPrice = p; }
            });

            cumulativeDelta += candleDelta;

            const isBullish = candleData.close >= candleData.open;
            const candleColor = isBullish ? '#10b981' : '#ef4444';
            
            // 🟢 GoCharting Style: Anchor the candle visually to the far left of the column
            const candleX = currentX + 6; 
            
            ctx.strokeStyle = candleColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(candleX, getPriceY(candleData.high));
            ctx.lineTo(candleX, getPriceY(candleData.low));
            ctx.stroke();

            const bodyTop = getPriceY(Math.max(candleData.open, candleData.close));
            const bodyBottom = getPriceY(Math.min(candleData.open, candleData.close));
            const bodyHeight = Math.max(3, bodyBottom - bodyTop); 
            
            ctx.fillStyle = candleColor;
            ctx.fillRect(candleX - 3, bodyTop - (priceScale/2), 6, bodyHeight + priceScale);

            // 🟢 GoCharting Style: Draw a subtle center divider for the footprint
            const boxLeft = currentX + 16;
            const boxWidth = COL_WIDTH - 20;
            const center = boxLeft + (boxWidth / 2);

            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(center, getPriceY(candleData.high) - priceScale/2);
            ctx.lineTo(center, getPriceY(candleData.low) + priceScale/2);
            ctx.stroke();

            prices.forEach(price => {
                const y = getPriceY(price);
                if (y < -50 || y > height - X_AXIS_HEIGHT + 50) return;

                const b = matrix[price].buy_vol;
                const s = matrix[price].sell_vol;
                
                const bidBelow = matrix[price - TICK_SIZE] ? matrix[price - TICK_SIZE].sell_vol : 0;
                const askAbove = matrix[price + TICK_SIZE] ? matrix[price + TICK_SIZE].buy_vol : 0;
                
                const isBuyImb = (b > bidBelow * 3) && (b > 50);
                const isSellImb = (s > askAbove * 3) && (s > 50);

                const volIntensity = (b + s) / maxVol;
                
                ctx.fillStyle = `rgba(59, 130, 246, ${volIntensity * 0.3})`;
                ctx.fillRect(boxLeft, y - priceScale/2, boxWidth, priceScale);

                if (price === pocPrice) {
                    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5;
                    ctx.strokeRect(boxLeft, y - priceScale/2, boxWidth, priceScale);
                }

                ctx.font = "bold 10px 'JetBrains Mono'"; 
                ctx.textBaseline = "middle";

                // Sell Side (Left)
                ctx.textAlign = "right";
                ctx.fillStyle = isSellImb ? '#ef4444' : (isLight ? '#475569' : '#d4d4d8');
                ctx.fillText(s, center - 4, y);

                // Buy Side (Right)
                ctx.textAlign = "left";
                ctx.fillStyle = isBuyImb ? '#10b981' : (isLight ? '#475569' : '#d4d4d8');
                ctx.fillText(b, center + 4, y);
            });
            
            // 🟢 NEW: Dynamic Canvas Stats (Pinned directly below the candle's lowest point)
            const lowestPrice = Math.min(...prices, candleData.low);
            let statsY = getPriceY(lowestPrice) + priceScale / 2 + 15;

            // Only draw if the stats are visible above the time axis
            if (statsY < height - X_AXIS_HEIGHT) {
                ctx.font = "bold 10px 'JetBrains Mono'";
                ctx.textAlign = "center";

                // Delta
                ctx.fillStyle = candleDelta > 0 ? '#10b981' : '#ef4444';
                ctx.fillText(`Δ: ${candleDelta > 0 ? '+' : ''}${candleDelta}`, center, statsY);
                statsY += 14;

                // Cumulative Delta
                ctx.fillStyle = cumulativeDelta > 0 ? '#6ee7b7' : '#fca5a5';
                ctx.fillText(`ΣΔ: ${cumulativeDelta > 0 ? '+' : ''}${cumulativeDelta}`, center, statsY);
                statsY += 14;

                // Total Volumes
                ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
                ctx.fillText(`${totalSellVol} x ${totalBuyVol}`, center, statsY);
            }

            // 🟢 Minimal Bottom Timeline
            const panelY = height - X_AXIS_HEIGHT;
            ctx.fillStyle = isLight ? '#f8fafc' : '#0c0c0f';
            ctx.fillRect(currentX, panelY, COL_WIDTH, X_AXIS_HEIGHT);
            
            ctx.fillStyle = isLight ? '#475569' : '#a1a1aa';
            ctx.font = "bold 11px 'JetBrains Mono'";
            ctx.textAlign = "center";
            ctx.fillText(timeKey, center, panelY + 16);

            currentX -= (COL_WIDTH + GAP);
        }

        if (showVP && sessionStats.maxVPVol) {
            ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b'; 
            ctx.fillRect(0, 0, VP_WIDTH, height - X_AXIS_HEIGHT);
            ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
            ctx.beginPath(); ctx.moveTo(VP_WIDTH, 0); ctx.lineTo(VP_WIDTH, height - X_AXIS_HEIGHT); ctx.stroke();

            const maxVPBarWidth = VP_WIDTH - 20;

            Object.keys(volumeProfile).forEach(pStr => {
                const p = parseFloat(pStr);
                const y = getPriceY(p);
                if (y < -50 || y > height - X_AXIS_HEIGHT + 50) return;

                const vol = volumeProfile[p];
                const barW = (vol / sessionStats.maxVPVol) * maxVPBarWidth;

                if (p <= sessionStats.vah && p >= sessionStats.val) {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.35)'; 
                } else {
                    ctx.fillStyle = 'rgba(161, 161, 170, 0.15)'; 
                }
                ctx.fillRect(0, y - priceScale/2 + 1, barW, priceScale - 2);
            });

            ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)'; ctx.lineWidth = 1;
            const vahY = getPriceY(sessionStats.vah);
            const valY = getPriceY(sessionStats.val);
            if (vahY > 0) { ctx.beginPath(); ctx.moveTo(0, vahY); ctx.lineTo(width - Y_AXIS_WIDTH, vahY); ctx.stroke(); }
            if (valY > 0) { ctx.beginPath(); ctx.moveTo(0, valY); ctx.lineTo(width - Y_AXIS_WIDTH, valY); ctx.stroke(); }

            const vpocY = getPriceY(sessionStats.vpoc);
            if (vpocY > 0) {
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(0, vpocY); ctx.lineTo(width - Y_AXIS_WIDTH, vpocY); ctx.stroke();
                ctx.setLineDash([]); 
            }
        }

        if (showDOM) {
            const DOM_WIDTH = 100; 
            const domStartX = width - Y_AXIS_WIDTH; 
            
            let maxDomVol = 0;
            Object.values(latestDomCache.bids).forEach(v => { if(v > maxDomVol) maxDomVol = v; });
            Object.values(latestDomCache.asks).forEach(v => { if(v > maxDomVol) maxDomVol = v; });

            if (maxDomVol > 0) {
              // Asks (Red)
                Object.keys(latestDomCache.asks).forEach(pStr => {
                    const p = parseFloat(pStr);
                    const vol = latestDomCache.asks[pStr];
                    const y = getPriceY(p);
                    if (y < -50 || y > height - X_AXIS_HEIGHT) return;

                    const barW = (vol / maxDomVol) * DOM_WIDTH;
                    
                    // 1. Draw the bar first
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.3)'; 
                    ctx.fillRect(domStartX - barW, y - priceScale/2 + 1, barW, priceScale - 2);
                    
                    // 2. THEN draw the text on top
                    ctx.fillStyle = isLight ? '#ef4444' : '#fca5a5';
                    ctx.font = "bold 9px 'JetBrains Mono'";
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(vol >= 1000 ? (vol/1000).toFixed(1) + 'k' : vol, domStartX - 5, y);
                });

                // Bids (Green)
                Object.keys(latestDomCache.bids).forEach(pStr => {
                    const p = parseFloat(pStr);
                    const vol = latestDomCache.bids[pStr];
                    const y = getPriceY(p);
                    if (y < -50 || y > height - X_AXIS_HEIGHT) return;

                    const barW = (vol / maxDomVol) * DOM_WIDTH;
                    
                    // 1. Draw the bar first
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.3)'; 
                    ctx.fillRect(domStartX - barW, y - priceScale/2 + 1, barW, priceScale - 2);
                    
                    // 2. THEN draw the text on top
                    ctx.fillStyle = isLight ? '#10b981' : '#6ee7b7';
                    ctx.font = "bold 9px 'JetBrains Mono'";
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(vol >= 1000 ? (vol/1000).toFixed(1) + 'k' : vol, domStartX - 5, y);
                });
            }
        }

        ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b';
        ctx.fillRect(width - Y_AXIS_WIDTH, 0, Y_AXIS_WIDTH, height);
        ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
        ctx.beginPath(); ctx.moveTo(width - Y_AXIS_WIDTH, 0); ctx.lineTo(width - Y_AXIS_WIDTH, height); ctx.stroke();

        ctx.fillStyle = isLight ? '#0f172a' : '#f4f4f5'; 
        ctx.font = "bold 11px 'JetBrains Mono'"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
        
        for (let p = startPrice; p <= endPrice; p += gridStep) {
            const y = getPriceY(p);
            if (y > 0 && y < height - X_AXIS_HEIGHT) { 
                ctx.beginPath(); ctx.moveTo(width - Y_AXIS_WIDTH, y); ctx.lineTo(width - Y_AXIS_WIDTH + 4, y); ctx.stroke();
                ctx.fillText(p, width - Y_AXIS_WIDTH + 8, y); 
            }
        }
    } // <--- END OF renderCanvas

</script>
