<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Live Footprint and Order Flow charts for the NSE. Spot volume imbalances, trapped traders, and exact execution prices to refine your trading edge.">
<title>Order Flow & Footprint Charts | Nifty</title>
<link rel="icon" type="image/png" href="optionchain_fevicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
    :root { 
        --bg: #09090b; --card: #141415; --section: #202023; --border: #27272a; 
        --text: #f4f4f5; --muted: #a1a1aa; 
        --accent: #3b82f6; --gold: #f59e0b; --green: #10b981; --red: #ef4444; 
    }
    
    /* 🟢 Flex Layout prevents overlapping and handles screen sizes automatically */
    body { margin: 0; padding: 0; 
          background-color: var(--bg); 
          color: var(--text); 
          overflow: hidden; 
          font-family: 'Inter', 
          sans-serif; user-select: none; 
          display: flex; 
          flex-direction: column; 
          height: 100dvh; 
          width: 100vw; 
          /* 2. DISABLE TEXT SELECTION (HIGHLIGHTING) */
    -webkit-user-select: none; /* Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE10+/Edge */
    user-select: none;         /* Standard */
         }
    
    /* --- 1. CLEANED HEADER --- */
    header { 
        height: 52px; background: var(--card); border-bottom: 1px solid var(--border); 
        display: flex; justify-content: space-between; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .logo { font-weight: 900; font-size: 18px; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;}
    .logo span { color: var(--accent); }
    
    .header-prices { display: flex; align-items: center; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
    .price-box { display: flex; align-items: center; gap: 8px; }
    .price-label { color: var(--muted); font-size: 10px; }
    .price-val { color: var(--text); }
    .price-val.fut { color: var(--gold); }

    /* --- 2. WORKSPACE & LEFT NAV --- */
    .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
    
    .left-nav {
        width: 52px; background: var(--card); border-right: 1px solid var(--border); 
        display: flex; flex-direction: column; align-items: center; padding-top: 16px; gap: 12px; flex-shrink: 0; z-index: 20;
    }
    .tool-btn { 
        width: 36px; height: 36px; border-radius: 8px; background: transparent; border: 1px solid transparent; 
        color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; 
    }
    .tool-btn:hover { background: var(--section); color: var(--text); }
    .tool-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }

    /* --- 3. CHART CONTAINER --- */
    #chart-container { 
        flex: 1; position: relative; background: #0c0c0f; cursor: crosshair; 
        touch-action: none; /* 🟢 CRITICAL: Stops mobile browser from pulling-to-refresh when dragging chart */
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* --- SESSION STATS --- */
    .stats-panel {
        position: absolute; top: 15px; left: 135px; /* Offset to clear Volume Profile */
        background: rgba(20, 20, 21, 0.85); border: 1px solid var(--border);
        border-radius: 8px; padding: 12px 15px; width: 180px;
        font-family: 'JetBrains Mono', monospace; font-size: 10px; z-index: 10;
        backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none;
    }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-label { color: var(--muted); }
    .stat-val { font-weight: 700; color: var(--text); }
    /* 🟢 LIGHT THEME VARIABLES */
    .light-theme {
        --bg: #f8fafc;
        --card: #ffffff;
        --section: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
    }

    /* 🟢 SETTINGS PANEL STYLES */
    .settings-panel {
        display: none; 
        position: absolute; 
        left: 60px; 
        bottom: 10px; /* Anchored to bottom since button is at bottom */
        background: var(--card); 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        width: 190px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        flex-direction: column; 
        z-index: 9999; 
    }
    .light-theme .settings-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .settings-header { padding: 10px 16px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--section); border-radius: 8px 8px 0 0; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.15s; }
    .settings-row:hover { background: var(--section); border-radius: 0 0 8px 8px; }
    .settings-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; transform: scale(1.2); }

    /* --- 📱 MOBILE OPTIMIZATION --- */
    @media (max-width: 768px) {
        .logo { font-size: 15px; }
        .logo span { display: none; } /* Hide "Greek" word to save space */
        .header-prices { gap: 10px; font-size: 11px; flex-direction: column; align-items: flex-end; gap: 2px;}
        .left-nav { width: 40px; padding-top: 10px; gap: 8px; }
        .tool-btn { width: 30px; height: 30px; }
        .stats-panel { display: none !important; } /* Hide heavy stats on mobile */
    }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><span>Greek</span> Calculator</a>
    
    <div class="header-prices">
        <div class="price-box">
            <span class="price-label">SPOT:</span>
            <span class="price-val" id="hdr-spot">--</span>
        </div>
        <div class="price-box">
            <span class="price-label">FUT:</span>
            <span class="price-val fut" id="hdr-fut">--</span>
        </div>
    </div>
</header>

<div class="workspace">
    <div class="left-nav">
        <button class="tool-btn active" title="Cursor">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg>
        </button>
        <button class="tool-btn" title="Measure">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21L3 3"></path><path d="M21 3v6"></path><path d="M21 3h-6"></path></svg>
        </button>
        <div style="position: relative; margin-top: auto; margin-bottom: 10px;" id="settings-wrapper">
            <button class="tool-btn" id="btn-settings" onclick="toggleSettings(event)" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div class="settings-panel" id="settings-panel">
                <div class="settings-header">General</div>
                <label class="settings-row">Light Theme <input type="checkbox" id="theme-cb" onchange="toggleTheme()"></label>
            </div>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="orderflowCanvas"></canvas>
        
        <div class="stats-panel" id="stats-panel" style="display: none;">
            <div style="font-size: 9px; color: var(--accent); margin-bottom: 10px; font-weight: 800; letter-spacing: 0.5px;">SESSION STATS</div>
            <div class="stat-row"><span class="stat-label">VWAP</span><span class="stat-val" id="st-vwap">--</span></div>
            <div class="stat-row"><span class="stat-label">Cum Delta</span><span class="stat-val" id="st-delta">--</span></div>
            <div class="stat-row"><span class="stat-label">VPOC</span><span class="stat-val" id="st-vpoc" style="color: var(--gold);">--</span></div>
            <div class="stat-row"><span class="stat-label">VAH/VAL</span><span class="stat-val" id="st-va">-- / --</span></div>
            
            <div style="height: 1px; background: var(--border); margin: 10px 0;"></div>
            
            <div class="stat-row"><span class="stat-label">OR High (15m)</span><span class="stat-val" id="st-orh" style="color: var(--green);">--</span></div>
            <div class="stat-row"><span class="stat-label">OR Low (15m)</span><span class="stat-val" id="st-orl" style="color: var(--red);">--</span></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    
    const app = initializeApp({ apiKey: "AIzaSyCXycONZBbhKBo__PtazbQXJR9n44dmoGo", authDomain: "insideoptionchain.firebaseapp.com", projectId: "insideoptionchain" });
    const auth = getAuth(app);

    const canvas = document.getElementById('orderflowCanvas');
    const container = document.getElementById('chart-container');
    const ctx = canvas.getContext('2d');
    let width, height;

    // --- UI & THEME TOGGLE LOGIC ---
    window.toggleSettings = function(event) {
        if(event) event.stopPropagation();
        const panel = document.getElementById('settings-panel');
        const btn = document.getElementById('btn-settings');
        const isVisible = panel.style.display === 'flex';
        
        if (isVisible) {
            panel.style.display = 'none';
            btn.classList.remove('active');
        } else {
            panel.style.display = 'flex';
            btn.classList.add('active');
        }
    };

    window.toggleTheme = function() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('owl-theme', isLight ? 'light' : 'dark');
        renderCanvas(); // Redraw canvas with new colors instantly
    };

    // Close settings when clicking outside
    document.addEventListener('click', function(event) {
        const panel = document.getElementById('settings-panel');
        const btn = document.getElementById('btn-settings');
        if (panel && panel.style.display === 'flex') {
            if (!panel.contains(event.target) && !btn.contains(event.target)) {
                panel.style.display = 'none';
                btn.classList.remove('active');
            }
        }
    });

    // Check saved theme on load
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('owl-theme') === 'light') {
            document.body.classList.add('light-theme');
            const cb = document.getElementById('theme-cb');
            if (cb) cb.checked = true;
        }
    });

    // --- CHART CONFIGURATION ---
    const COL_WIDTH = 180;      
    const Y_AXIS_WIDTH = 60;   // Shrink Y axis slightly for mobile
    const VP_WIDTH = 120;      
    const X_AXIS_HEIGHT = 60;  // Shrink X axis slightly
    const GAP = 15;             
    const TICK_SIZE = 5;       

    // --- CAMERA / INTERACTION STATE ---
    let offsetX = 0; 
    let offsetY = 0; 
    let priceScale = 25; 
    
    let isDraggingChart = false;
    let isDraggingScale = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    
    let latestDataCache = {};
    let volumeProfile = {};
    let sessionStats = {};

    function resizeCanvas() { 
        width = canvas.width = container.clientWidth; 
        height = canvas.height = container.clientHeight; 
        renderCanvas(); 
    }
    window.addEventListener('resize', resizeCanvas); 
    
    // Call resize once immediately, then again slightly delayed to ensure flexbox settled
    resizeCanvas();
    setTimeout(resizeCanvas, 100);

    // 🟢 NEW: UNIFIED MOUSE & TOUCH HANDLERS FOR MOBILE DRAGGING
    function handlePointerDown(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        
        if (x > width - Y_AXIS_WIDTH) isDraggingScale = true;
        else isDraggingChart = true;
        
        lastMouseX = clientX;
        lastMouseY = clientY;
    }

    function handlePointerMove(e) {
        if (!isDraggingChart && !isDraggingScale) return;
        if (e.cancelable) e.preventDefault(); // Stop mobile scrolling

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const dx = clientX - lastMouseX;
        const dy = clientY - lastMouseY;
        
        if (isDraggingChart) {
            offsetX += dx;
            offsetY += dy;
            renderCanvas();
        } else if (isDraggingScale) {
            priceScale -= dy * 0.2;
            priceScale = Math.max(5, Math.min(priceScale, 100));
            renderCanvas();
        }
        
        lastMouseX = clientX;
        lastMouseY = clientY;
    }

    function handlePointerUp() { 
        isDraggingChart = false; 
        isDraggingScale = false; 
    }

    // Attach Mouse Events
    canvas.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove, { passive: false });
    window.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('mouseleave', handlePointerUp);

    // Attach Touch Events (Mobile)
    canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
    window.addEventListener('touchmove', handlePointerMove, { passive: false });
    window.addEventListener('touchend', handlePointerUp);
    window.addEventListener('touchcancel', handlePointerUp);


    // --- DATA POLLING ---
    onAuthStateChanged(auth, async (user) => {
        if (!user) return window.location.href = "index.html";
        const token = await user.getIdToken();
        
        // 🟢 NEW: Sync live Header Prices alongside Footprint
        setInterval(async () => {
            try {
                // Fetch Tick Data for Header
                const tResp = await fetch('https://api.greekcalculator.in/api/ticker-prices');
                const tData = await tResp.json();
                
                // 1. Update Spot Price
                if (tData["NIFTY 50"]) {
                    document.getElementById('hdr-spot').innerText = tData["NIFTY 50"].ltp.toFixed(2);
                }
                
                // 2. Update REAL Future Price
                if (tData["NIFTY FUT"]) {
                    document.getElementById('hdr-fut').innerText = tData["NIFTY FUT"].ltp.toFixed(2); 
                }

                // Fetch Footprint Data
                const r = await fetch('https://api.greekcalculator.in/api/footprint', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await r.json();
                if (data.status === "success" && Object.keys(data.data).length > 0) {
                    latestDataCache = data.data;
                    processSessionData(); 
                    renderCanvas();
                }
            } catch(e) {}
        }, 2000);
    });

    function processSessionData() {
        volumeProfile = {};
        let totalVol = 0; let totalVolPrice = 0; let totalDelta = 0;

        const times = Object.keys(latestDataCache).sort();
        if(!times.length) return;

        let orHigh = -Infinity, orLow = Infinity;
        let ibHigh = -Infinity, ibLow = Infinity;

        const parseTime = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
        const firstTimeMin = parseTime(times[0]);

        times.forEach(t => {
            const min = parseTime(t);
            const isOR = min < firstTimeMin + 15; 
            const isIB = min < firstTimeMin + 60; 

            const matrix = latestDataCache[t].volumes || {};
            
            Object.keys(matrix).forEach(pStr => {
                const p = parseFloat(pStr);
                const cell = matrix[pStr];
                const vol = cell.buy_vol + cell.sell_vol;
                const delta = cell.buy_vol - cell.sell_vol;

                if (!volumeProfile[p]) volumeProfile[p] = 0;
                volumeProfile[p] += vol;
                
                totalVol += vol; totalVolPrice += p * vol; totalDelta += delta;

                if(isOR) { if(p > orHigh) orHigh = p; if(p < orLow) orLow = p; }
                if(isIB) { if(p > ibHigh) ibHigh = p; if(p < ibLow) ibLow = p; }
            });
        });

        let vpoc = 0; let maxVPVol = 0;
        Object.keys(volumeProfile).forEach(pStr => {
            if (volumeProfile[pStr] > maxVPVol) { maxVPVol = volumeProfile[pStr]; vpoc = parseFloat(pStr); }
        });

        let targetVol = totalVol * 0.70; let currentVol = volumeProfile[vpoc] || 0;
        let vah = vpoc; let val = vpoc;
        let up = vpoc + TICK_SIZE; let down = vpoc - TICK_SIZE;

        while (currentVol < targetVol) {
            let upVol = volumeProfile[up] || 0; let downVol = volumeProfile[down] || 0;
            if (upVol === 0 && downVol === 0) break;
            if (upVol >= downVol) { currentVol += upVol; vah = up; up += TICK_SIZE; } 
            else { currentVol += downVol; val = down; down -= TICK_SIZE; }
        }

        sessionStats = {
            vwap: totalVolPrice / totalVol, cumDelta: totalDelta, vpoc, vah, val, maxVPVol,
            orHigh: orHigh === -Infinity ? '--' : orHigh, orLow: orLow === Infinity ? '--' : orLow,
            ibHigh: ibHigh === -Infinity ? '--' : ibHigh, ibLow: ibLow === Infinity ? '--' : ibLow
        };

        document.getElementById('stats-panel').style.display = window.innerWidth > 768 ? 'block' : 'none';
        document.getElementById('st-vwap').innerText = isNaN(sessionStats.vwap) ? '--' : sessionStats.vwap.toFixed(2);
        
        const dEl = document.getElementById('st-delta');
        dEl.innerText = (totalDelta > 0 ? '+' : '') + totalDelta;
        dEl.style.color = totalDelta > 0 ? 'var(--green)' : 'var(--red)';
        
        document.getElementById('st-vpoc').innerText = sessionStats.vpoc;
        document.getElementById('st-va').innerText = `${sessionStats.vah} / ${sessionStats.val}`;
        document.getElementById('st-orh').innerText = sessionStats.orHigh;
        document.getElementById('st-orl').innerText = sessionStats.orLow;
    }

// --- CORE RENDERING ENGINE ---
    function renderCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        const isLight = document.body.classList.contains('light-theme');
        document.getElementById('chart-container').style.background = isLight ? '#f8fafc' : '#0c0c0f';

        const timeKeys = Object.keys(latestDataCache).sort();
        
        // 🟢 THE FAILSAFE: If there is no data, show a message instead of a blank void!
        if (timeKeys.length === 0) {
            ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
            ctx.font = "600 14px 'Inter'";
            ctx.textAlign = "center";
            ctx.fillText("Waiting for Footprint Data... (Check Market Hours or Futures Token)", width / 2, height / 2);
            return;
        }

        let minPrice = Infinity, maxPrice = -Infinity;
        
        // 🟢 PREVENT NaN CRASHES: Auto-calculate High/Low if backend is still building the candle
        timeKeys.forEach(t => {
            const candle = latestDataCache[t];
            let cHigh = candle.high;
            let cLow = candle.low;
            
            if (cHigh === undefined || cLow === undefined) {
                const prices = Object.keys(candle.volumes || {}).map(Number);
                if (prices.length > 0) {
                    cHigh = Math.max(...prices);
                    cLow = Math.min(...prices);
                }
            }

            if (cHigh !== undefined && cHigh > maxPrice) maxPrice = cHigh;
            if (cLow !== undefined && cLow < minPrice) minPrice = cLow;
        });

        // If data is fully corrupted, stop rendering
        if (minPrice === Infinity) return;

        const getPriceY = (price) => {
            const diffFromMin = price - minPrice;
            return height - X_AXIS_HEIGHT - 50 - (diffFromMin / TICK_SIZE * priceScale) + offsetY;
        };

        // Draw Horizontal Grid (Theme Aware)
        ctx.strokeStyle = isLight ? '#e2e8f0' : '#1e1e24'; 
        ctx.lineWidth = 1; ctx.beginPath();
        for (let p = Math.floor(minPrice - 50); p <= maxPrice + 50; p += TICK_SIZE) {
            const y = getPriceY(p);
            if (y > 0 && y < height - X_AXIS_HEIGHT) { ctx.moveTo(0, y); ctx.lineTo(width - Y_AXIS_WIDTH, y); }
        }
        ctx.stroke();

        let currentX = width - Y_AXIS_WIDTH - COL_WIDTH - GAP + offsetX;
        let cumulativeDelta = 0;

        for (let i = timeKeys.length - 1; i >= 0; i--) {
            if (currentX + COL_WIDTH < VP_WIDTH) break; 
            
            const timeKey = timeKeys[i];
            const candleData = latestDataCache[timeKey];
            const matrix = candleData.volumes || {}; 
            const prices = Object.keys(matrix).map(Number).sort((a,b) => b-a);
            
            let maxVol = 0, pocPrice = null, candleDelta = 0;
            
            prices.forEach(p => {
                const b = matrix[p].buy_vol, s = matrix[p].sell_vol;
                candleDelta += (b - s);
                if (b+s > maxVol) { maxVol = b+s; pocPrice = p; }
            });

            cumulativeDelta += candleDelta;

            // DRAW OHLC CANDLESTICK
            const isBullish = candleData.close >= candleData.open;
            const candleColor = isBullish ? '#10b981' : '#ef4444';
            const candleX = currentX + 15; 
            
            ctx.strokeStyle = candleColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(candleX, getPriceY(candleData.high));
            ctx.lineTo(candleX, getPriceY(candleData.low));
            ctx.stroke();

            const bodyTop = getPriceY(Math.max(candleData.open, candleData.close));
            const bodyBottom = getPriceY(Math.min(candleData.open, candleData.close));
            const bodyHeight = Math.max(3, bodyBottom - bodyTop); 
            
            ctx.fillStyle = candleColor;
            ctx.fillRect(candleX - 4, bodyTop - (priceScale/2), 8, bodyHeight + priceScale);

            prices.forEach(price => {
                const y = getPriceY(price);
                if (y < -50 || y > height - X_AXIS_HEIGHT + 50) return;

                const b = matrix[price].buy_vol;
                const s = matrix[price].sell_vol;
                
                const center = currentX + 30 + (COL_WIDTH - 30) / 2; 
                
                const bidBelow = matrix[price - TICK_SIZE] ? matrix[price - TICK_SIZE].sell_vol : 0;
                const askAbove = matrix[price + TICK_SIZE] ? matrix[price + TICK_SIZE].buy_vol : 0;
                
                const isBuyImb = (b > bidBelow * 3) && (b > 50);
                const isSellImb = (s > askAbove * 3) && (s > 50);

                const volIntensity = (b + s) / maxVol;
                
                // Draw volume box
                ctx.fillStyle = `rgba(59, 130, 246, ${volIntensity * 0.3})`;
                ctx.fillRect(currentX + 30, y - priceScale/2, COL_WIDTH - 30, priceScale);

                if (price === pocPrice) {
                    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
                    ctx.strokeRect(currentX + 30, y - priceScale/2, COL_WIDTH - 30, priceScale);
                }

                ctx.font = "bold 11px 'JetBrains Mono'"; ctx.textBaseline = "middle";

                ctx.textAlign = "right";
                ctx.fillStyle = isSellImb ? '#ef4444' : '#fca5a5';
                ctx.fillText(s, center - 10, y);

                ctx.textAlign = "left";
                ctx.fillStyle = isBuyImb ? '#10b981' : '#6ee7b7';
                ctx.fillText(b, center + 10, y);
            });
            
            const panelY = height - X_AXIS_HEIGHT;
            
            ctx.fillStyle = candleDelta > 0 ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            ctx.fillRect(currentX, panelY, COL_WIDTH, 20);
            ctx.fillStyle = candleDelta > 0 ? '#10b981' : '#ef4444';
            ctx.textAlign = "center"; ctx.font = "bold 10px 'JetBrains Mono'";
            ctx.fillText(`Δ: ${candleDelta > 0 ? '+' : ''}${candleDelta}`, currentX + COL_WIDTH/2, panelY + 10);

            ctx.fillStyle = cumulativeDelta > 0 ? 'rgba(16, 185, 129, 0.05)' : 'rgba(239, 68, 68, 0.05)';
            ctx.fillRect(currentX, panelY + 20, COL_WIDTH, 20);
            ctx.fillStyle = cumulativeDelta > 0 ? '#6ee7b7' : '#fca5a5';
            ctx.fillText(`ΣΔ: ${cumulativeDelta > 0 ? '+' : ''}${cumulativeDelta}`, currentX + COL_WIDTH/2, panelY + 30);

            // 🟢 Time Background & Text (Theme Aware)
            ctx.fillStyle = isLight ? '#e2e8f0' : '#1a1a1d';
            ctx.fillRect(currentX, panelY + 40, COL_WIDTH, 20);
            ctx.fillStyle = isLight ? '#475569' : '#a1a1aa';
            ctx.fillText(timeKey, currentX + COL_WIDTH/2, panelY + 50);

            currentX -= (COL_WIDTH + GAP);
        }

        if (sessionStats.maxVPVol) {
            // 🟢 Volume Profile Background (Theme Aware)
            ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b'; 
            ctx.fillRect(0, 0, VP_WIDTH, height - X_AXIS_HEIGHT);
            ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
            ctx.beginPath(); ctx.moveTo(VP_WIDTH, 0); ctx.lineTo(VP_WIDTH, height - X_AXIS_HEIGHT); ctx.stroke();

            const maxVPBarWidth = VP_WIDTH - 20;

            Object.keys(volumeProfile).forEach(pStr => {
                const p = parseFloat(pStr);
                const y = getPriceY(p);
                if (y < -50 || y > height - X_AXIS_HEIGHT + 50) return;

                const vol = volumeProfile[p];
                const barW = (vol / sessionStats.maxVPVol) * maxVPBarWidth;

                if (p <= sessionStats.vah && p >= sessionStats.val) {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.35)'; 
                } else {
                    ctx.fillStyle = 'rgba(161, 161, 170, 0.15)'; 
                }
                ctx.fillRect(0, y - priceScale/2 + 1, barW, priceScale - 2);
            });

            ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)'; ctx.lineWidth = 1;
            const vahY = getPriceY(sessionStats.vah);
            const valY = getPriceY(sessionStats.val);
            if (vahY > 0) { ctx.beginPath(); ctx.moveTo(0, vahY); ctx.lineTo(width - Y_AXIS_WIDTH, vahY); ctx.stroke(); }
            if (valY > 0) { ctx.beginPath(); ctx.moveTo(0, valY); ctx.lineTo(width - Y_AXIS_WIDTH, valY); ctx.stroke(); }

            const vpocY = getPriceY(sessionStats.vpoc);
            if (vpocY > 0) {
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(0, vpocY); ctx.lineTo(width - Y_AXIS_WIDTH, vpocY); ctx.stroke();
                ctx.setLineDash([]); 
            }
        }

        // 🟢 Y-Axis Background & Text (Theme Aware)
        ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b';
        ctx.fillRect(width - Y_AXIS_WIDTH, 0, Y_AXIS_WIDTH, height);
        ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
        ctx.beginPath(); ctx.moveTo(width - Y_AXIS_WIDTH, 0); ctx.lineTo(width - Y_AXIS_WIDTH, height); ctx.stroke();

        ctx.fillStyle = isLight ? '#0f172a' : '#f4f4f5'; 
        ctx.font = "bold 11px 'JetBrains Mono'"; ctx.textAlign = "left";
        for (let p = Math.floor(minPrice - 50); p <= maxPrice + 50; p += TICK_SIZE) {
            const y = getPriceY(p);
            if (y > 0 && y < height - X_AXIS_HEIGHT) { ctx.fillText(p, width - Y_AXIS_WIDTH + 15, y); }
        }
    }
</script></body>
</html>
