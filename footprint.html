<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Live Footprint and Order Flow charts for the NSE. Spot volume imbalances, trapped traders, and exact execution prices to refine your trading edge.">
<title>Order Flow & Footprint Charts | Nifty</title>
<link rel="icon" type="image/png" href="optionchain_fevicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
    :root { 
        /* 🟢 Dark Theme (Refined Obsidian/Slate) */
        --bg: #0b0f19; 
        --card: #131b2c; 
        --section: #1e293b; 
        --border: #334155; 
        --text: #f8fafc; 
        --muted: #94a3b8; 
        --accent: #3b82f6; 
        --gold: #fbbf24; 
        --green: #22c55e; 
        --red: #ef4444; 
    }


    /* 🟢 Flex Layout prevents overlapping and handles screen sizes automatically */
    body { margin: 0; padding: 0; 
          background-color: var(--bg); 
          color: var(--text); 
          overflow: hidden; 
          font-family: 'Inter', 
          sans-serif; user-select: none; 
          display: flex; 
          flex-direction: column; 
          height: 100dvh; 
          width: 100vw; 
          /* 2. DISABLE TEXT SELECTION (HIGHLIGHTING) */
    -webkit-user-select: none; /* Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE10+/Edge */
    user-select: none;         /* Standard */
         }

/* drawing-tools.css */
.drawing-canvas {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 8000; cursor: crosshair;
}
.drawing-canvas.active { pointer-events: auto; }

.drawing-toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; 
    display: none; /* 🟢 FIX: Hidden by default! */
    align-items: center; gap: 8px; z-index: 8001;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.light-theme .drawing-toolbar { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

.draw-btn {
    background: transparent; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 6px;
    border-radius: 6px; transition: 0.2s;
}
.draw-btn:hover { background: var(--section); color: var(--text); }
.draw-btn.active { background: rgba(59, 130, 246, 0.15); color: var(--accent); }

.draw-toggle-label {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    font-weight: 600; color: var(--muted); cursor: pointer;
}
.draw-toggle-label input { accent-color: var(--accent); cursor: pointer; }
.drag-handle { color: var(--border); cursor: grab; font-weight: bold; margin-right: 4px; user-select: none; }
    

    /* --- 1. CLEANED HEADER --- */
    header { 
        height: 52px; background: var(--card); border-bottom: 1px solid var(--border); 
        display: flex; justify-content: space-between; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .logo { font-weight: 900; font-size: 18px; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;}
    .logo span { color: var(--accent); }

    .header-prices { display: flex; align-items: center; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
    .price-box { display: flex; align-items: center; gap: 8px; }
    .price-label { color: var(--muted); font-size: 10px; }
    .price-val { color: var(--text); }
    .price-val.fut { color: var(--gold); }

/* --- 2. WORKSPACE & LEFT NAV --- */
    .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }

.left-nav {
    width: 52px; 
    background: var(--card); 
    border-right: 1px solid var(--border); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding-top: 16px; 
    padding-bottom: 16px; /* Adds breathing room at the bottom */
    flex-shrink: 0; 
    z-index: 100; 
    position: relative;
    overflow: visible; 
}

    /* 🟢 NEW: The Draggable Resizer Bar */
    .resizer-x {
        width: 4px; /* The hit-area for the mouse */
        background-color: transparent;
        cursor: col-resize; /* The left-right arrow cursor */
        position: relative;
        z-index: 30;
        transition: background-color 0.2s;
    }
    .resizer-x:hover, .resizer-x.is-resizing {
        background-color: var(--accent); /* Glows blue when hovering or dragging */
    }

    .tool-btn { 
        width: 36px; height: 36px; border-radius: 8px; background: transparent; border: 1px solid transparent; 
        color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; 
    }
    .tool-btn:hover { background: var(--section); color: var(--text); }
    .tool-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }

    /* --- 3. CHART CONTAINER --- */
#chart-container { 
        flex: 1; 
        position: relative; 
        background: #0c0c0f; 
        cursor: crosshair; 
        overflow-y: auto; 
        overflow-x: hidden;
        touch-action: pan-y; 
    }
  canvas { 
        display: block; 
        width: 100%; 
        min-height: 800px; 
        height: 100%; 
    }
   :root { 
        /* 🟢 Dark Theme (Refined Obsidian/Slate) */
        --bg: #0b0f19; 
        --card: #131b2c; 
        --section: #1e293b; 
        --border: #334155; 
        --text: #f8fafc; 
        --muted: #94a3b8; 
        --accent: #3b82f6; 
        --gold: #fbbf24; 
        --green: #22c55e; 
        --red: #ef4444; 
    }

    .light-theme {
        /* 🟢 Light Theme (Clean Paper/Silver) */
        --bg: #f8fafc;
        --card: #ffffff;
        --section: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --gold: #d97706;
        --green: #16a34a;
        --red: #dc2626;
    }

    /* --- SESSION STATS --- */
    .stats-panel {
        position: absolute; top: 15px; left: 135px; 
        /* Default Dark Theme background */
        background: rgba(19, 27, 44, 0.85); 
        border: 1px solid var(--border);
        border-radius: 8px; padding: 12px 15px; width: 180px;
        font-family: 'JetBrains Mono', monospace; font-size: 10px; z-index: 10;
        backdrop-filter: blur(10px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        pointer-events: none;
    }

    /* 🟢 NEW: Clean, flat styling for the light theme stats box */
    .light-theme .stats-panel {
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-label { color: var(--muted); }
    .stat-val { font-weight: 700; color: var(--text); }
    /* 🟢 LIGHT THEME VARIABLES */

    .light-theme {
        /* 🟢 Light Theme (Clean Paper/Silver) */
        --bg: #f8fafc;
        --card: #ffffff;
        --section: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --gold: #d97706;
        --green: #16a34a;
        --red: #dc2626;
    }
    /* --- 🟢 FANCY CALENDAR ACTIVE STATE --- */
    .date-active-glow {
        background: rgba(245, 158, 11, 0.15) !important;
        border: 1px solid var(--gold) !important;
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        animation: pulseGold 2s infinite alternate;
    }

    .date-active-glow svg {
        color: var(--gold) !important;
    }

    @keyframes pulseGold {
        0% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.2); }
        100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.6); }
    }
  /* 🟢 SETTINGS PANEL FIX: Push to the right so it doesn't get hidden */
.settings-panel {
        display: none; 
        position: absolute; 
        left: 55px; /* Pushes it out of the left-nav cleanly */
        top: -350px; 
        background: var(--card); 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        width: 190px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        flex-direction: column; 
        z-index: 10000; 
    }

    .light-theme .settings-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .settings-header { padding: 10px 16px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--section); border-radius: 8px 8px 0 0; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.15s; }
    .settings-row:hover { background: var(--section); border-radius: 0 0 8px 8px; }
    .settings-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; transform: scale(1.2); }

/* 🟢 Desktop overrides for the new Nav structure */
    .hamburger-btn { display: none; background: transparent; border: none; color: var(--text); cursor: pointer; padding: 0; }

   .nav-content { 
    display: flex; 
    flex-direction: column; 
    width: 100%; 
    align-items: center; 
    justify-content: flex-start; /* Groups them neatly at the top */
    gap: 16px; /* 🟢 This forces an exact, identical 16px gap between EVERY button */
    height: 100%; 
}
    .nav-btn { display: none; color: var(--muted); text-decoration: none; font-weight: 600; font-size: 14px; padding: 10px; border-radius: 6px; transition: 0.2s; text-align: center; }
    .nav-btn:hover { background: var(--section); color: var(--text); }
    .divider { display: none; } /* Hide divider on desktop */
    .mobile-menu-toggle { display: none; }

    /* 🟢 Footprint Imbalance Glows */
    .imb-buy { background: rgba(16, 185, 129, 0.2); border-radius: 4px; padding: 0 2px; }
    .imb-sell { background: rgba(239, 68, 68, 0.2); border-radius: 4px; padding: 0 2px; }
    
    .light-theme .imb-buy { background: rgba(22, 163, 74, 0.2); }
    .light-theme .imb-sell { background: rgba(220, 38, 38, 0.2); }

    /* --- 🟢 PHASE 3: SMART MONEY GAUGE --- */
    .smart-gauge-panel {
        position: absolute; bottom: 15px; right: 15px;
        background: rgba(19, 27, 44, 0.85); border: 1px solid var(--border);
        border-radius: 8px; padding: 12px 20px; text-align: center;
        backdrop-filter: blur(10px); z-index: 10;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none;
    }
    .light-theme .smart-gauge-panel { background: rgba(255, 255, 255, 0.95); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .gauge-title { font-size: 9px; font-weight: 800; color: var(--muted); letter-spacing: 1px; }
    .gauge-score { font-size: 26px; font-weight: 900; margin: 4px 0; font-family: 'JetBrains Mono', monospace; transition: color 0.3s; }
    .gauge-label { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; display: inline-block; }

    /* 🟢 Crosshair & Sub-Chart Stats Panel */
    .crosshair-stats {
        position: absolute;
        top: 15px;
        right: 15px; /* Pinned to the top right */
        background: rgba(19, 27, 44, 0.85);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        z-index: 10;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        pointer-events: none;
        display: none; /* Hidden by default until hover */
        flex-direction: column;
        gap: 4px;
        text-align: right;
    }
    .light-theme .crosshair-stats {
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .ch-label { color: var(--muted); margin-right: 8px;}
    .ch-val { font-weight: 800; color: var(--text); }
    
/* --- 📱 MOBILE SPECIFIC OPTIMIZATION --- */
    @media (max-width: 768px) {
        .logo { font-size: 15px; }
        .logo span { display: none; } 
        .header-prices { gap: 10px; font-size: 11px; flex-direction: column; align-items: flex-end; gap: 2px;}
        
        /* 🟢 Match Live-Market Vertical Dropdown Nav */
        .mobile-menu-toggle { display: flex !important; width: 40px !important; height: 40px !important; justify-content: center; align-items: center; color: var(--accent) !important; margin: 0; border: none; background: transparent;}
        
        .nav-content { display: none; flex-direction: column; gap: 16px; padding-bottom: 12px; }
        
        /* Transform the PC Sidebar into a Mobile Dropdown Hamburger */
        .left-nav {
            width: 40px !important; height: 40px !important; top: 65px; padding-top: 0 !important; border-radius: 0 8px 8px 0;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: absolute; 
            left: 0; background: var(--card); transition: height 0.3s ease; overflow: visible; z-index: 1000;
            box-shadow: none;
        }
        
        .left-nav.menu-open { height: auto !important; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .left-nav.menu-open .nav-content { display: flex; }
        
        /* Force settings panel to popup differently on mobile */
        .settings-panel {
            position: fixed !important; 
            left: 50px !important; 
            top: 65px !important;  
            bottom: auto !important; 
            width: 220px !important; 
            max-height: calc(100vh - 80px) !important;
            overflow-y: auto !important; 
            overflow-x: hidden !important; 
            -webkit-overflow-scrolling: touch !important; 
            z-index: 9999 !important; 
        }
        
        .tool-btn { width: 32px !important; height: 32px !important; }
        .resizer-x { display: none; }
        .stats-panel { display: none !important; } 
    }
</style>
</head>

        isDrawing = true;
        startX = e.clientX || e.touches[0].clientX;
        startY = e.clientY || e.touches[0].clientY;
        ctx.beginPath();
        ctx.moveTo(startX, startY);

        const MAIN_CHART_BOTTOM = height - TOTAL_BOTTOM_RESERVE; 

  // --- CAMERA / INTERACTION STATE ---
    let offsetX = 0;

    // 🟢 UPGRADED: TV-Style Axis Hit Detection
 function handlePointerDown(e) {
        const rect = canvas.getBoundingClientRect();
        
        // Use native offsetX/Y for perfect mouse mapping, fallback to bounding math for Touch screens
        const x = e.offsetX !== undefined ? e.offsetX : (e.touches[0].clientX - rect.left);
        const y = e.offsetY !== undefined ? e.offsetY : (e.touches[0].clientY - rect.top);

        if (x > width - Y_AXIS_WIDTH && y < height - X_AXIS_HEIGHT) {
            isDraggingYScale = true;
            document.body.style.cursor = 'ns-resize';
        } else if (y > height - X_AXIS_HEIGHT && x < width - Y_AXIS_WIDTH) {
            isDraggingXScale = true;
            document.body.style.cursor = 'ew-resize';
        } else {
            isDraggingChart = true;
            document.body.style.cursor = 'grabbing';
        }

        // Keep clientX/Y for drag delta math
        lastMouseX = e.touches ? e.touches[0].clientX : e.clientX;
        lastMouseY = e.touches ? e.touches[0].clientY : e.clientY;
    }
function handlePointerMove(e) {
        const rect = canvas.getBoundingClientRect();
        
        // Use native offsetX/Y for perfect mouse mapping, fallback to bounding math for Touch screens
        const x = e.offsetX !== undefined ? e.offsetX : (e.touches[0].clientX - rect.left);
        const y = e.offsetY !== undefined ? e.offsetY : (e.touches[0].clientY - rect.top);
        
        // Track mouse for the crosshair
        currentHoverX = x;
        currentHoverY = y;
        isHovering = (x > (showVP ? VP_WIDTH : 0) && x < width - Y_AXIS_WIDTH && y < height - TOTAL_BOTTOM_RESERVE);

        if (!isDraggingChart && !isDraggingYScale && !isDraggingXScale) {
            // Hover cursors
            if (x > width - Y_AXIS_WIDTH && y < height - TOTAL_BOTTOM_RESERVE) canvas.style.cursor = 'ns-resize';
            else if (y > height - TOTAL_BOTTOM_RESERVE && x < width - Y_AXIS_WIDTH) canvas.style.cursor = 'ew-resize';
            else canvas.style.cursor = 'crosshair';
            
            renderCanvas(); // Force redraw to move the crosshair
            return;
        }

        if (e.cancelable) e.preventDefault(); 

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const dx = clientX - lastMouseX;
        const dy = clientY - lastMouseY;

        if (isDraggingChart) {
            offsetX += dx;
            offsetY += dy;
        } else if (isDraggingYScale) {
            priceScale *= (1 - dy * 0.005);
            priceScale = Math.max(2, Math.min(priceScale, 150));
        } else if (isDraggingXScale) {
            COL_WIDTH *= (1 + dx * 0.005);
            COL_WIDTH = Math.max(40, Math.min(COL_WIDTH, 400));
            GAP = COL_WIDTH * (15/180); 
        }

        renderCanvas();
        lastMouseX = clientX;
        lastMouseY = clientY;
    }
    function handlePointerUp() { 
        isDraggingChart = false; 
        isDraggingYScale = false; 
        isDraggingXScale = false;
        document.body.style.cursor = 'default';
        canvas.style.cursor = 'crosshair';

    canvas.addEventListener('mousedown', handlePointerDown);

canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
    window.addEventListener('touchmove', handlePointerMove, { passive: false });
    window.addEventListener('touchend', handlePointerUp);

    // 🟢 FIX: DECLARE GLOBAL DATA CONTAINERS **BEFORE** CALLING resizeCanvas()

        width = canvas.width = canvas.offsetWidth;

// --- DATA POLLING ---
    let isLiveMode = true;

    onAuthStateChanged(auth, async (user) => {
        if (!user) return window.location.href = "index.html";
        const token = await user.getIdToken();

        document.getElementById('history-date').addEventListener('change', async (e) => {

            const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));

            if (!selectedDate || selectedDate === today) {
                isLiveMode = true;

                // 🟢 Force a clean UI refresh when jumping back to live mode
                latestDataCache = {};
                latestDomCache = { bids: {}, asks: {} };

                return;
            }

                const data = await r.json();

                processSessionData(); 
                renderCanvas();
            } catch(err) { console.error("History fetch failed", err); }
        });
        setInterval(async () => {
            if (!isLiveMode) return; 

            try {
                const tResp = await fetch('https://api.greekcalculator.in/api/ticker-prices');
                const tData = await tResp.json();

                if (tData["NIFTY 50"]) document.getElementById('hdr-spot').innerText = tData["NIFTY 50"].ltp.toFixed(2);
                if (tData["NIFTY FUT"]) document.getElementById('hdr-fut').innerText = tData["NIFTY FUT"].ltp.toFixed(2); 

                const r = await fetch('https://api.greekcalculator.in/api/footprint', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await r.json();

                if (data.status === "success") {

                }
            } catch(e) {}
        }, 2000);

    function processSessionData() {
        volumeProfile = {};
        let totalVol = 0; let totalVolPrice = 0; let totalDelta = 0;

        const times = Object.keys(latestDataCache).sort();
        if(!times.length) return;

        let orHigh = -Infinity, orLow = Infinity;
        let ibHigh = -Infinity, ibLow = Infinity;

const parseTime = (t) => { 
            if (!t) return 0;
            const parts = t.split(':');
            if (parts.length < 2) return 0;
            return parseInt(parts[0]) * 60 + parseInt(parts[1]); 
        };
        const firstTimeMin = parseTime(times[0]) || (9 * 60 + 15); 

        times.forEach(t => {
            if (!latestDataCache[t]) return;

            const min = parseTime(t);
            const isOR = min < firstTimeMin + 15; 
            const isIB = min < firstTimeMin + 60; 

            const matrix = latestDataCache[t].volumes || latestDataCache[t] || {};

            Object.keys(matrix).forEach(pStr => {
                const p = parseFloat(pStr);
                const cell = matrix[pStr];
                const vol = cell.buy_vol + cell.sell_vol;
                const delta = cell.buy_vol - cell.sell_vol;

                if (!volumeProfile[p]) volumeProfile[p] = 0;
                volumeProfile[p] += vol;

                totalVol += vol; totalVolPrice += p * vol; totalDelta += delta;

                if(isOR) { if(p > orHigh) orHigh = p; if(p < orLow) orLow = p; }
                if(isIB) { if(p > ibHigh) ibHigh = p; if(p < ibLow) ibLow = p; }
            });
        });

        let vpoc = 0; let maxVPVol = 0;
        Object.keys(volumeProfile).forEach(pStr => {
            if (volumeProfile[pStr] > maxVPVol) { maxVPVol = volumeProfile[pStr]; vpoc = parseFloat(pStr); }
        });

        let targetVol = totalVol * 0.70; let currentVol = volumeProfile[vpoc] || 0;
        let vah = vpoc; let val = vpoc;
        let up = vpoc + TICK_SIZE; let down = vpoc - TICK_SIZE;

        while (currentVol < targetVol) {
            let upVol = volumeProfile[up] || 0; let downVol = volumeProfile[down] || 0;
            if (upVol === 0 && downVol === 0) break;
            if (upVol >= downVol) { currentVol += upVol; vah = up; up += TICK_SIZE; } 
            else { currentVol += downVol; val = down; down -= TICK_SIZE; }
        }

      sessionStats = {
            vwap: totalVolPrice / totalVol, cumDelta: totalDelta, vpoc, vah, val, maxVPVol,
            orHigh: orHigh === -Infinity ? '--' : orHigh, orLow: orLow === Infinity ? '--' : orLow,
            ibHigh: ibHigh === -Infinity ? '--' : ibHigh, ibLow: ibLow === Infinity ? '--' : ibLow
        };

        // 🟢 PHASE 2: ACCUMULATION / DISTRIBUTION ZONE DETECTOR
        accumulationZones = [];
        let consecutiveChop = 0;
        let zoneStartIdx = -1;
        let runningZoneDelta = 0;
        let zoneHigh = -Infinity;
        let zoneLow = Infinity;
        
        for (let i = 0; i < times.length; i++) {
            const candle = latestDataCache[times[i]];
            if(!candle) continue;
            
            const range = candle.high - candle.low;
            
            // Logic: Price range < 50 points
            if (range < 50) {
                if (consecutiveChop === 0) {
                    zoneStartIdx = i;
                    zoneHigh = candle.high;
                    zoneLow = candle.low;
                    runningZoneDelta = 0;
                }
                consecutiveChop++;
                zoneHigh = Math.max(zoneHigh, candle.high);
                zoneLow = Math.min(zoneLow, candle.low);
                
                // Calculate delta for this candle
                let cDelta = 0;
                const matrix = candle.volumes || {};
                Object.values(matrix).forEach(cell => { cDelta += (cell.buy_vol - cell.sell_vol); });
                runningZoneDelta += cDelta;
                
            } else {
                // Breakout occurred. Did we have 3+ candles of chop with > 100k delta buildup?
                if (consecutiveChop >= 3 && Math.abs(runningZoneDelta) > 100000) {
                    accumulationZones.push({
                        startIdx: zoneStartIdx,
                        endIdx: i - 1, // Ended on the previous candle
                        high: zoneHigh,
                        low: zoneLow,
                        delta: runningZoneDelta
                    });
                }
                consecutiveChop = 0;
            }
        }
        // Check if a zone is active at the very end of the day
        if (consecutiveChop >= 3 && Math.abs(runningZoneDelta) > 100000) {
             accumulationZones.push({ startIdx: zoneStartIdx, endIdx: times.length - 1, high: zoneHigh, low: zoneLow, delta: runningZoneDelta });
        }

        const statsPanel = document.getElementById('stats-panel');
        const statsCb = document.getElementById('stats-cb');
        if (window.innerWidth <= 768 && statsCb.checked === false) {
             statsPanel.style.display = 'none';
        } else if (statsCb.checked) {
             statsPanel.style.display = 'block';
        }

        document.getElementById('st-vwap').innerText = isNaN(sessionStats.vwap) ? '--' : sessionStats.vwap.toFixed(2);

        const dEl = document.getElementById('st-delta');
        dEl.innerText = (totalDelta > 0 ? '+' : '') + totalDelta;
        dEl.style.color = totalDelta > 0 ? 'var(--green)' : 'var(--red)';

        document.getElementById('st-vpoc').innerText = sessionStats.vpoc;
        document.getElementById('st-va').innerText = `${sessionStats.vah} / ${sessionStats.val}`;
        document.getElementById('st-orh').innerText = sessionStats.orHigh;
        document.getElementById('st-orl').innerText = sessionStats.orLow;
    }

// --- CORE RENDERING ENGINE ---
    function renderCanvas() {
        ctx.clearRect(0, 0, width, height);

        const isLight = document.body.classList.contains('light-theme');
        document.getElementById('chart-container').style.background = isLight ? '#f8fafc' : '#0c0c0f';

        const timeKeys = Object.keys(latestDataCache).sort();

        if (timeKeys.length === 0) {
            ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
            ctx.font = "600 14px 'Inter'";
            ctx.textAlign = "center";
            ctx.fillText("Waiting for Footprint Data... (Check Market Hours)", width / 2, height / 2);
            return;
        }

        let minPrice = Infinity, maxPrice = -Infinity;
        
// 🟢 PRE-COMPUTE DATA FOR SUB-CHARTS & COMPOSITE SCORE
        const cumDeltaTimeline = [];
        const volumeTimeline = [];
        let maxCumDelta = -Infinity, minCumDelta = Infinity;
        let maxSessionVol = 0;
        let runningCumDelta = 0;
        let volWindow = []; // Used for moving average calculation

        timeKeys.forEach(t => {
            const candle = latestDataCache[t];
            let cHigh = -Infinity, cLow = Infinity;
            let cDelta = 0, cVol = 0;

            const matrix = candle.volumes || {};
            const prices = Object.keys(matrix).map(Number);
            
            prices.forEach(p => {
                cHigh = Math.max(cHigh, p);
                cLow = Math.min(cLow, p);
                cDelta += (matrix[p].buy_vol - matrix[p].sell_vol);
                cVol += (matrix[p].buy_vol + matrix[p].sell_vol);
            });

            if (cHigh === -Infinity && candle.high > 0) cHigh = candle.high;
            if (cLow === Infinity && candle.low > 0) cLow = candle.low;
            if (cHigh !== -Infinity && cHigh > maxPrice) maxPrice = cHigh;
            if (cLow !== Infinity && cLow < minPrice) minPrice = cLow;
            
            runningCumDelta += cDelta;
            cumDeltaTimeline.push(runningCumDelta);
            volumeTimeline.push({ vol: cVol, delta: cDelta });
            
            maxCumDelta = Math.max(maxCumDelta, runningCumDelta);
            minCumDelta = Math.min(minCumDelta, runningCumDelta);
            maxSessionVol = Math.max(maxSessionVol, cVol);

            // 🟢 PHASE 3: COMPOSITE SMART MONEY SCORE CALCULATION
            volWindow.push(cVol);
            if (volWindow.length > 5) volWindow.shift();
            const avgVol = volWindow.reduce((a, b) => a + b, 0) / volWindow.length;
            const volSpike = cVol > (avgVol * 1.5); // 50% above rolling average

            let score = 0;
            const isBullish = candle.close >= candle.open;

            // 1. Divergence (+30/-30)
            if (!isBullish && cDelta > 0) score += 30; // Price down, buying up -> Bullish Divergence
            if (isBullish && cDelta < 0) score -= 30;  // Price up, selling up -> Bearish Divergence

            // 2. Delta% (+20/-20)
            const deltaPct = cVol > 0 ? (cDelta / cVol) * 100 : 0;
            if (deltaPct > 60) score += 20;
            if (deltaPct < -60) score -= 20;

            // 3. CumDelta Rising (+15/-15)
            if (cDelta > 0) score += 15;
            if (cDelta < 0) score -= 15;

            // 4. Volume Spike + Delta (+10/-10)
            if (volSpike && cDelta > 0) score += 10;
            if (volSpike && cDelta < 0) score -= 10;

            // 5. Accumulation Zone Interaction (+25/-25)
            let inZoneScore = 0;
            accumulationZones.forEach(z => {
                // If price touches or is inside the zone
                if (cLow <= z.high && cHigh >= z.low) {
                    if (z.delta > 0) inZoneScore = 25;  // Accumulation bounce
                    if (z.delta < 0) inZoneScore = -25; // Distribution rejection
                }
            });
            score += inZoneScore;

            // Cap the score between -100 and +100
            candle.smartScore = Math.max(-100, Math.min(100, score));
        });

        // 🟢 FIX: Main Chart stops above TOTAL_BOTTOM_RESERVE based on Toggle
        const TOTAL_BOTTOM_RESERVE = showSubCharts 
            ? ((SUBCHART_HEIGHT * 2) + (SUBCHART_SPACING * 2) + X_AXIS_HEIGHT)
            : X_AXIS_HEIGHT; 
            
        const MAIN_CHART_BOTTOM = height - TOTAL_BOTTOM_RESERVE; 
        // =========================================================
        // 🟢 NEW: AUTO-CENTER LOGIC
        // Automatically focuses the camera on the latest traded price
        // =========================================================
        if (needsAutoCenter && timeKeys.length > 0) {
            // Get the close price of the most recent footprint candle
            const latestCandle = latestDataCache[timeKeys[timeKeys.length - 1]];
            const targetPrice = latestCandle.close;
            
            // Calculate where this price WOULD be drawn without moving the camera
            const unoffsetY = MAIN_CHART_BOTTOM - 20 - ((targetPrice - minPrice) / TICK_SIZE * priceScale);
            
            // Adjust the camera Y offset to push the target price exactly to the middle
            offsetY = (MAIN_CHART_BOTTOM / 2) - unoffsetY;
            
            // Turn off auto-center so the user can now drag the chart manually
            needsAutoCenter = false; 
        }
        // =========================================================

        const getPriceY = (price) => {
            const diffFromMin = price - minPrice;
            return MAIN_CHART_BOTTOM - 20 - (diffFromMin / TICK_SIZE * priceScale) + offsetY;
        };

        const priceAtTop = minPrice + ((MAIN_CHART_BOTTOM - 20 + offsetY) / priceScale) * TICK_SIZE;
        const priceAtBottom = minPrice + ((-20 + offsetY - MAIN_CHART_BOTTOM) / priceScale) * TICK_SIZE;
        const topBound = Math.max(priceAtTop, priceAtBottom);
        const botBound = Math.min(priceAtTop, priceAtBottom);

        let gridStep = TICK_SIZE;
        if (priceScale < 8) gridStep = TICK_SIZE * 10;     
        else if (priceScale < 15) gridStep = TICK_SIZE * 4; 
        else if (priceScale < 30) gridStep = TICK_SIZE * 2; 
        
        const startPrice = Math.floor(botBound / gridStep) * gridStep;
        const endPrice = Math.ceil(topBound / gridStep) * gridStep;

        ctx.strokeStyle = isLight ? '#e2e8f0' : '#1e1e24'; 
        ctx.lineWidth = 1; ctx.beginPath();
        for (let p = startPrice; p <= endPrice; p += gridStep) {
            const y = getPriceY(p);
            if (y > 0 && y < MAIN_CHART_BOTTOM) { ctx.moveTo(0, y); ctx.lineTo(width - Y_AXIS_WIDTH, y); }
        }
        ctx.stroke();
        
        let currentX = width - Y_AXIS_WIDTH - COL_WIDTH - GAP + offsetX;
        
        // --- PRE-CALCULATE X POSITIONS FOR ZONES AND CROSSHAIR ---
        const xPositions = [];
        for (let i = timeKeys.length - 1; i >= 0; i--) {
            xPositions[i] = currentX;
            currentX -= (COL_WIDTH + GAP);
        }
        
        // 🟢 PHASE 2: DRAW ACCUMULATION ZONES
        if (showZones) {
            accumulationZones.forEach(zone => {
                const startX = xPositions[zone.startIdx];
                const endX = xPositions[zone.endIdx];
                
                if (startX > 0 && endX < width - Y_AXIS_WIDTH) {
                    const yTop = getPriceY(zone.high);
                    const yBot = getPriceY(zone.low);
                    
                    const isAccum = zone.delta > 0;
                    ctx.fillStyle = isAccum ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                    
                    const boxW = Math.abs(startX - endX) + COL_WIDTH;
                    const boxH = Math.abs(yBot - yTop);
                    ctx.fillRect(Math.min(startX, endX), Math.min(yTop, yBot), boxW, boxH);
                    
                    ctx.strokeStyle = isAccum ? '#10b981' : '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    
                    ctx.beginPath();
                    ctx.moveTo(Math.min(startX, endX), Math.min(yTop, yBot));
                    ctx.lineTo(Math.max(startX, endX) + COL_WIDTH, Math.min(yTop, yBot));
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(Math.min(startX, endX), Math.max(yTop, yBot));
                    ctx.lineTo(Math.max(startX, endX) + COL_WIDTH, Math.max(yTop, yBot));
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = isAccum ? '#10b981' : '#ef4444';
                    ctx.font = "bold 10px 'JetBrains Mono'";
                    ctx.textAlign = "left";
                    const mStr = (zone.delta / 100000).toFixed(1) + 'L';
                    ctx.fillText(`ZONE: ${isAccum ? '+' : ''}${mStr} Δ`, Math.min(startX, endX) + 5, Math.min(yTop, yBot) - 5);
                }
            });
        }

        // Reset currentX for the main drawing loop
        currentX = width - Y_AXIS_WIDTH - COL_WIDTH - GAP + offsetX;
        let cumulativeDelta = 0;
        let activeHoverData = null; 

        for (let i = timeKeys.length - 1; i >= 0; i--) {
            if (currentX + COL_WIDTH < (showVP ? VP_WIDTH : 0)) break; 

            const timeKey = timeKeys[i];
            const candleData = latestDataCache[timeKey];
            const matrix = candleData.volumes || {}; 
            const prices = Object.keys(matrix).map(Number).sort((a,b) => b-a);

            let maxVol = 0, pocPrice = null, candleDelta = 0;
            let totalBuyVol = 0, totalSellVol = 0;

            prices.forEach(p => {
                const b = matrix[p].buy_vol, s = matrix[p].sell_vol;
                candleDelta += (b - s);
                totalBuyVol += b;
                totalSellVol += s;
                if (b+s > maxVol) { maxVol = b+s; pocPrice = p; }
            });

            cumulativeDelta += candleDelta;
            const isBullish = candleData.close >= candleData.open;
           const totalVol = totalBuyVol + totalSellVol;
            const candleX = currentX + 6; 

            // 🟢 MISSED STEP 4 (Part 1): Color-code the candle border based on Smart Money Score
            const score = candleData.smartScore || 0;
            let candleBorderColor = isLight ? '#94a3b8' : '#475569'; // Default Neutral

            if (score >= 70) candleBorderColor = '#10b981';      // Strong Buy
            else if (score >= 40) candleBorderColor = '#34d399'; // Buy
            else if (score <= -70) candleBorderColor = '#ef4444'; // Strong Sell
            else if (score <= -40) candleBorderColor = '#f87171'; // Sell

            // Draw the wick/border using the Smart Score color
            ctx.strokeStyle = candleBorderColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(candleX, getPriceY(candleData.high));
            ctx.lineTo(candleX, getPriceY(candleData.low));
            ctx.stroke();

            const bodyTop = getPriceY(Math.max(candleData.open, candleData.close));
            const bodyBottom = getPriceY(Math.min(candleData.open, candleData.close));
            const bodyHeight = Math.max(3, bodyBottom - bodyTop); 

            // Keep the solid body the traditional Red/Green
            const candleBodyColor = isBullish ? '#10b981' : '#ef4444';
            ctx.fillStyle = candleBodyColor;
            ctx.fillRect(candleX - 3, bodyTop - (priceScale/2), 6, bodyHeight + priceScale);

            // 🟢 PHASE 1: Bullish/Bearish Divergence Detector
            const isDivergent = (isBullish && candleDelta < 0) || (!isBullish && candleDelta > 0);
            if (showDivergence && isDivergent && Math.abs(candleDelta) > 50) { 
                ctx.beginPath();
                if (isBullish) {
                    ctx.fillStyle = '#ef4444';
                    ctx.moveTo(candleX, getPriceY(candleData.high) - 15);
                    ctx.lineTo(candleX - 5, getPriceY(candleData.high) - 25);
                    ctx.lineTo(candleX + 5, getPriceY(candleData.high) - 25);
                } else {
                    ctx.fillStyle = '#10b981';
                    ctx.moveTo(candleX, getPriceY(candleData.low) + 15);
                    ctx.lineTo(candleX - 5, getPriceY(candleData.low) + 25);
                    ctx.lineTo(candleX + 5, getPriceY(candleData.low) + 25);
                }
                ctx.fill();
            }

            const boxLeft = currentX + 16;
            const boxWidth = COL_WIDTH - 20;
            const center = boxLeft + (boxWidth / 2);

            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(center, getPriceY(candleData.high) - priceScale/2);
            ctx.lineTo(center, getPriceY(candleData.low) + priceScale/2);
            ctx.stroke();

            prices.forEach(price => {
                const y = getPriceY(price);
                if (y < -50 || y > MAIN_CHART_BOTTOM + 50) return;

                const b = matrix[price].buy_vol;
                const s = matrix[price].sell_vol;
                const bidBelow = matrix[price - TICK_SIZE] ? matrix[price - TICK_SIZE].sell_vol : 0;
                const askAbove = matrix[price + TICK_SIZE] ? matrix[price + TICK_SIZE].buy_vol : 0;

                // 🟢 PHASE 1: Diagonal Imbalances 
                const isBuyImb = showImbalances && (b > bidBelow * 3) && (b > 50);
                const isSellImb = showImbalances && (s > askAbove * 3) && (s > 50);

               // 🟢 MISSED STEP 4 (Part 2): True Orderflow Imbalance Heatmap
                const totalNodeVol = b + s;
                const volIntensity = maxVol > 0 ? (totalNodeVol / maxVol) : 0;
                const imbalanceRatio = totalNodeVol > 0 ? (b - s) / totalNodeVol : 0; // Range: -1.0 to +1.0

                let r, g, bl, a;
                if (imbalanceRatio > 0) {
                    // Buyers dominate -> Green Gradient
                    r = 16; g = 185; bl = 129;
                    a = imbalanceRatio * volIntensity * 0.85; // Alpha based on BOTH imbalance strength and volume thickness
                } else {
                    // Sellers dominate -> Red Gradient
                    r = 239; g = 68; bl = 68;
                    a = Math.abs(imbalanceRatio) * volIntensity * 0.85;
                }

                // Add a tiny baseline alpha (+0.05) so purely neutral nodes are still faintly visible
                ctx.fillStyle = `rgba(${r}, ${g}, ${bl}, ${a + 0.05})`;
                ctx.fillRect(boxLeft, y - priceScale/2, boxWidth, priceScale);

                if (price === pocPrice) {
                    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5;
                    ctx.strokeRect(boxLeft, y - priceScale/2, boxWidth, priceScale);
                }

                ctx.font = "bold 10px 'JetBrains Mono'"; 
                ctx.textBaseline = "middle";

                // Sell Side
                ctx.textAlign = "right";
                if (isSellImb) {
                    ctx.fillStyle = isLight ? 'rgba(220, 38, 38, 0.2)' : 'rgba(239, 68, 68, 0.2)'; 
                    ctx.fillRect(center - 32, y - 7, 30, 14);
                    ctx.fillStyle = '#ef4444'; 
                } else { ctx.fillStyle = isLight ? '#475569' : '#d4d4d8'; }
                ctx.fillText(s, center - 4, y);

                // Buy Side
                ctx.textAlign = "left";
                if (isBuyImb) {
                    ctx.fillStyle = isLight ? 'rgba(22, 163, 74, 0.2)' : 'rgba(16, 185, 129, 0.2)'; 
                    ctx.fillRect(center + 2, y - 7, 30, 14);
                    ctx.fillStyle = '#10b981'; 
                } else { ctx.fillStyle = isLight ? '#475569' : '#d4d4d8'; }
                ctx.fillText(b, center + 4, y);
            });

            // 🟢 PHASE 1: Delta Heatmap Logic
            const lowestPrice = Math.min(...prices, candleData.low);
            let statsY = getPriceY(lowestPrice) + priceScale / 2 + 15;

            if (statsY < height - X_AXIS_HEIGHT) {
                ctx.font = "bold 10px 'JetBrains Mono'";
                ctx.textAlign = "center";

                let deltaPct = totalVol > 0 ? (Math.abs(candleDelta) / totalVol) * 100 : 0;
                let deltaBoxColor = 'transparent';
                let deltaTextColor = candleDelta > 0 ? '#10b981' : '#ef4444';

                if (showHeatmap) {
                    if (deltaPct > 60) {
                        if (candleDelta > 0) {
                            deltaBoxColor = deltaPct > 80 ? 'rgba(16, 185, 129, 0.3)' : 'rgba(16, 185, 129, 0.15)';
                        } else {
                            deltaBoxColor = deltaPct > 80 ? 'rgba(239, 68, 68, 0.3)' : 'rgba(239, 68, 68, 0.15)';
                        }
                    }
                }

                if (deltaBoxColor !== 'transparent') {
                    ctx.fillStyle = deltaBoxColor;
                    ctx.fillRect(center - 25, statsY - 7, 50, 14);
                    if (deltaPct > 80) { 
                        ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1;
                        ctx.strokeRect(center - 25, statsY - 7, 50, 14);
                    }
                }

                ctx.fillStyle = deltaTextColor;
                ctx.fillText(`Δ: ${candleDelta > 0 ? '+' : ''}${candleDelta}`, center, statsY);
                statsY += 14;

                ctx.fillStyle = cumulativeDelta > 0 ? '#6ee7b7' : '#fca5a5';
                ctx.fillText(`ΣΔ: ${cumulativeDelta > 0 ? '+' : ''}${cumulativeDelta}`, center, statsY);
                statsY += 14;

                ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
                ctx.fillText(`${totalSellVol} x ${totalBuyVol}`, center, statsY);
            }


            // 🟢 PHASE 2: SUB-CHARTS (CumDelta & Volume)
            if (showSubCharts) {
                const cDeltaBaseY = height - X_AXIS_HEIGHT - SUBCHART_SPACING - SUBCHART_HEIGHT;
                const volBaseY = height - X_AXIS_HEIGHT;
                
                const cdVal = cumDeltaTimeline[i];
                const prevCdVal = (i > 0) ? cumDeltaTimeline[i-1] : 0;
                
                const cdRange = Math.max(Math.abs(maxCumDelta), Math.abs(minCumDelta)) || 1;
                const getYForCD = (val) => {
                    const norm = val / cdRange; 
                    return cDeltaBaseY - (SUBCHART_HEIGHT/2) - (norm * (SUBCHART_HEIGHT/2));
                };
                
                const cdY = getYForCD(cdVal);
                const prevCdY = getYForCD(prevCdVal);
                const nextX = currentX + COL_WIDTH + GAP; 
                
                ctx.strokeStyle = cdVal >= prevCdVal ? '#10b981' : '#ef4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                if (i < timeKeys.length -1) {
                    ctx.moveTo(nextX + (COL_WIDTH/2), prevCdY);
                    ctx.lineTo(currentX + (COL_WIDTH/2), cdY);
                    ctx.stroke();
                }
                ctx.fillStyle = ctx.strokeStyle;
                ctx.beginPath();
                ctx.arc(currentX + (COL_WIDTH/2), cdY, 3, 0, Math.PI * 2);
                ctx.fill();

                const vData = volumeTimeline[i];
                const vH = (vData.vol / maxSessionVol) * SUBCHART_HEIGHT;
                ctx.fillStyle = vData.delta >= 0 ? '#10b981' : '#ef4444';
                ctx.fillRect(currentX + 16, volBaseY - vH, COL_WIDTH - 20, vH);
            }

            const panelY = height - X_AXIS_HEIGHT;
            ctx.fillStyle = isLight ? '#f8fafc' : '#0c0c0f';
            ctx.fillRect(currentX, panelY, COL_WIDTH, X_AXIS_HEIGHT);

            ctx.fillStyle = isLight ? '#475569' : '#a1a1aa';
            ctx.font = "bold 11px 'JetBrains Mono'";
            ctx.textAlign = "center";
            ctx.fillText(timeKey, center, panelY + 16);

            if (isHovering && currentHoverX >= currentX && currentHoverX <= currentX + COL_WIDTH) {
                activeHoverData = {
                    x: currentX + (COL_WIDTH / 2), 
                    time: timeKey,
                    cumDelta: cumDeltaTimeline[i],
                    vol: volumeTimeline[i].vol,
                    delta: volumeTimeline[i].delta
                };
            }

            currentX -= (COL_WIDTH + GAP);
        }

        // 🟢 DRAW THE MAIN PRICE AXIS
        ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b';
        ctx.fillRect(width - Y_AXIS_WIDTH, 0, Y_AXIS_WIDTH, height);
        ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
        ctx.beginPath(); ctx.moveTo(width - Y_AXIS_WIDTH, 0); ctx.lineTo(width - Y_AXIS_WIDTH, height); ctx.stroke();

        ctx.fillStyle = isLight ? '#0f172a' : '#f4f4f5'; 
        ctx.font = "bold 11px 'JetBrains Mono'"; ctx.textAlign = "left"; ctx.textBaseline = "middle";

        for (let p = startPrice; p <= endPrice; p += gridStep) {
            const y = getPriceY(p);
            if (y > 0 && y < MAIN_CHART_BOTTOM) { 
                ctx.beginPath(); ctx.moveTo(width - Y_AXIS_WIDTH, y); ctx.lineTo(width - Y_AXIS_WIDTH + 4, y); ctx.stroke();
                ctx.fillText(p, width - Y_AXIS_WIDTH + 8, y); 
            }
        }
        
      // 🟢 DRAW SUB-CHART DIVIDERS & Y-AXIS SCALES
        if (showSubCharts) {
            // Draw horizontal divider line
            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(0, height - X_AXIS_HEIGHT - SUBCHART_HEIGHT - SUBCHART_SPACING);
            ctx.lineTo(width - Y_AXIS_WIDTH, height - X_AXIS_HEIGHT - SUBCHART_HEIGHT - SUBCHART_SPACING);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 🟢 Sub-Chart Number Formatter (Converts 150000 to 1.5L)
            const fmtScale = (num) => {
                const absNum = Math.abs(num);
                if (absNum >= 100000) return (num / 100000).toFixed(1) + 'L';
                if (absNum >= 1000) return (num / 1000).toFixed(1) + 'k';
                return Math.round(num).toString();
            };

            ctx.font = "bold 9px 'JetBrains Mono'";
            ctx.textBaseline = "middle";

            // --- 1. CUMULATIVE DELTA SCALE ---
            const cdRange = Math.max(Math.abs(maxCumDelta), Math.abs(minCumDelta)) || 1;
            const cDeltaBaseY = height - X_AXIS_HEIGHT - SUBCHART_SPACING - SUBCHART_HEIGHT;
            const cdCenterY = cDeltaBaseY - (SUBCHART_HEIGHT / 2);

            ctx.textAlign = "left";
            
            // Zero Line
            ctx.fillStyle = isLight ? '#94a3b8' : '#64748b';
            ctx.fillText("0", width - Y_AXIS_WIDTH + 6, cdCenterY);
            
            // Max Positive Delta
            ctx.fillStyle = isLight ? '#10b981' : '#34d399';
            ctx.fillText("+" + fmtScale(cdRange), width - Y_AXIS_WIDTH + 6, cdCenterY - (SUBCHART_HEIGHT / 2) + 6);
            
            // Max Negative Delta
            ctx.fillStyle = isLight ? '#ef4444' : '#f87171';
            ctx.fillText("-" + fmtScale(cdRange), width - Y_AXIS_WIDTH + 6, cdCenterY + (SUBCHART_HEIGHT / 2) - 6);

            // Section Label (In the empty spacing)
            ctx.fillStyle = 'var(--muted)';
            ctx.textAlign = "center";
            ctx.fillText("CUM Δ", width - (Y_AXIS_WIDTH/2), height - X_AXIS_HEIGHT - SUBCHART_HEIGHT - (SUBCHART_SPACING/2));


            // --- 2. VOLUME SCALE ---
            const volBaseY = height - X_AXIS_HEIGHT;
            
            ctx.textAlign = "left";
            ctx.fillStyle = isLight ? '#64748b' : '#a1a1aa';
            
            // Max Volume Bar
            ctx.fillText(fmtScale(maxSessionVol), width - Y_AXIS_WIDTH + 6, volBaseY - SUBCHART_HEIGHT + 6);

            // Section Label (Faintly overlaid on the center of the volume pane)
            ctx.fillStyle = isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.1)';
            ctx.textAlign = "center";
            ctx.fillText("VOL", width - (Y_AXIS_WIDTH/2), volBaseY - (SUBCHART_HEIGHT/2));
        }

        // 🟢 PHASE 2: SYNCHRONIZED CROSSHAIR
        const chPanel = document.getElementById('crosshair-stats');
        
        if (isHovering && activeHoverData) {
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.4)'; 
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(activeHoverData.x, 0);
            ctx.lineTo(activeHoverData.x, height - X_AXIS_HEIGHT); 
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, currentHoverY);
            ctx.lineTo(width, currentHoverY);
            ctx.stroke();
            ctx.setLineDash([]);
            
if (currentHoverY < MAIN_CHART_BOTTOM) {
                const hoverPrice = minPrice + ((MAIN_CHART_BOTTOM - 20 - currentHoverY + offsetY) / priceScale) * TICK_SIZE;
                // 🟢 FIX: Explicit hex colors instead of CSS variables so the Canvas doesn't draw it black!
                ctx.fillStyle = isLight ? '#2563eb' : '#3b82f6'; 
                ctx.fillRect(width - Y_AXIS_WIDTH, currentHoverY - 10, Y_AXIS_WIDTH, 20);
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'left';
                ctx.fillText(Math.round(hoverPrice), width - Y_AXIS_WIDTH + 8, currentHoverY);
            }

            document.getElementById('ch-time').innerText = activeHoverData.time;
            
            const cdEl = document.getElementById('ch-cumdelta');
            cdEl.innerText = (activeHoverData.cumDelta > 0 ? '+' : '') + activeHoverData.cumDelta;
            cdEl.style.color = activeHoverData.cumDelta > 0 ? 'var(--green)' : 'var(--red)';
            
            const volEl = document.getElementById('ch-vol');
            volEl.innerText = activeHoverData.vol;
            volEl.style.color = activeHoverData.delta >= 0 ? 'var(--green)' : 'var(--red)';
            
            chPanel.style.display = 'flex';
        } else {
            chPanel.style.display = 'none';
        }
        // Add this directly below the existing crosshair-stats logic:
            
            const gaugePanel = document.getElementById('smart-gauge-panel');
            if (gaugePanel) {
                const currentScore = latestDataCache[activeHoverData.time].smartScore || 0;
                const scoreEl = document.getElementById('gauge-score');
                const labelEl = document.getElementById('gauge-label');
                
                scoreEl.innerText = (currentScore > 0 ? '+' : '') + currentScore;
                
                if (currentScore >= 70) {
                    scoreEl.style.color = 'var(--green)';
                    labelEl.style.background = 'rgba(16, 185, 129, 0.2)'; labelEl.style.color = 'var(--green)';
                    labelEl.innerText = "STRONG BUY";
                } else if (currentScore >= 40) {
                    scoreEl.style.color = 'var(--green)';
                    labelEl.style.background = 'rgba(16, 185, 129, 0.1)'; labelEl.style.color = 'var(--green)';
                    labelEl.innerText = "BUY";
                } else if (currentScore <= -70) {
                    scoreEl.style.color = 'var(--red)';
                    labelEl.style.background = 'rgba(239, 68, 68, 0.2)'; labelEl.style.color = 'var(--red)';
                    labelEl.innerText = "STRONG SELL";
                } else if (currentScore <= -40) {
                    scoreEl.style.color = 'var(--red)';
                    labelEl.style.background = 'rgba(239, 68, 68, 0.1)'; labelEl.style.color = 'var(--red)';
                    labelEl.innerText = "SELL";
                } else {
                    scoreEl.style.color = 'var(--text)';
                    labelEl.style.background = 'var(--section)'; labelEl.style.color = 'var(--muted)';
                    labelEl.innerText = "NEUTRAL";
                }
                gaugePanel.style.display = 'block';
            }

        // --- DRAW DOM ---
        if (showDOM) {
            const DOM_WIDTH = 100; 
            const domStartX = width - Y_AXIS_WIDTH; 

            let maxDomVol = 0;
            Object.values(latestDomCache.bids).forEach(v => { if(v > maxDomVol) maxDomVol = v; });
            Object.values(latestDomCache.asks).forEach(v => { if(v > maxDomVol) maxDomVol = v; });

            if (maxDomVol > 0) {
                Object.keys(latestDomCache.asks).forEach(pStr => {
                    const p = parseFloat(pStr);
                    const vol = latestDomCache.asks[pStr];
                    const y = getPriceY(p);
                    if (y < -50 || y > MAIN_CHART_BOTTOM) return;

                    const barW = (vol / maxDomVol) * DOM_WIDTH;
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.3)'; 
                    ctx.fillRect(domStartX - barW, y - priceScale/2 + 1, barW, priceScale - 2);
                    
                    ctx.fillStyle = isLight ? '#ef4444' : '#fca5a5';
                    ctx.font = "bold 9px 'JetBrains Mono'";
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(vol >= 1000 ? (vol/1000).toFixed(1) + 'k' : vol, domStartX - 5, y);
                });

                Object.keys(latestDomCache.bids).forEach(pStr => {
                    const p = parseFloat(pStr);
                    const vol = latestDomCache.bids[pStr];
                    const y = getPriceY(p);
                    if (y < -50 || y > MAIN_CHART_BOTTOM) return;

                    const barW = (vol / maxDomVol) * DOM_WIDTH;
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.3)'; 
                    ctx.fillRect(domStartX - barW, y - priceScale/2 + 1, barW, priceScale - 2);
                    
                    ctx.fillStyle = isLight ? '#10b981' : '#6ee7b7';
                    ctx.font = "bold 9px 'JetBrains Mono'";
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(vol >= 1000 ? (vol/1000).toFixed(1) + 'k' : vol, domStartX - 5, y);
                });
            }
        }
        
        if (showVP && sessionStats.maxVPVol) {
            ctx.fillStyle = isLight ? '#f1f5f9' : '#09090b'; 
            ctx.fillRect(0, 0, VP_WIDTH, MAIN_CHART_BOTTOM);
            ctx.strokeStyle = isLight ? '#cbd5e1' : '#27272a'; 
            ctx.beginPath(); ctx.moveTo(VP_WIDTH, 0); ctx.lineTo(VP_WIDTH, MAIN_CHART_BOTTOM); ctx.stroke();

            const maxVPBarWidth = VP_WIDTH - 20;

            Object.keys(volumeProfile).forEach(pStr => {
                const p = parseFloat(pStr);
                const y = getPriceY(p);
                if (y < -50 || y > MAIN_CHART_BOTTOM + 50) return;

                const vol = volumeProfile[p];
                const barW = (vol / sessionStats.maxVPVol) * maxVPBarWidth;

                if (p <= sessionStats.vah && p >= sessionStats.val) {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.35)'; 
                } else {
                    ctx.fillStyle = 'rgba(161, 161, 170, 0.15)'; 
                }
                ctx.fillRect(0, y - priceScale/2 + 1, barW, priceScale - 2);
            });

            ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)'; ctx.lineWidth = 1;
            const vahY = getPriceY(sessionStats.vah);
            const valY = getPriceY(sessionStats.val);
            if (vahY > 0 && vahY < MAIN_CHART_BOTTOM) { ctx.beginPath(); ctx.moveTo(0, vahY); ctx.lineTo(width - Y_AXIS_WIDTH, vahY); ctx.stroke(); }
            if (valY > 0 && valY < MAIN_CHART_BOTTOM) { ctx.beginPath(); ctx.moveTo(0, valY); ctx.lineTo(width - Y_AXIS_WIDTH, valY); ctx.stroke(); }

            const vpocY = getPriceY(sessionStats.vpoc);
            if (vpocY > 0 && vpocY < MAIN_CHART_BOTTOM) {
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(0, vpocY); ctx.lineTo(width - Y_AXIS_WIDTH, vpocY); ctx.stroke();
                ctx.setLineDash([]); 
            }
        }
        
    } // <--- END OF renderCanvas    
    // 🟢 FANCY: Update UI when a date is selected
    window.updateDateUI = function(selectedDate) {
        const wrapper = document.getElementById('date-btn-wrapper');

        // Generate today's date in IST
        const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

        if (!selectedDate || selectedDate === today) {
            wrapper.classList.remove('date-active-glow');
            wrapper.title = "Historical Date";
        } 
        else {
            wrapper.classList.add('date-active-glow');
            const formattedDate = new Date(selectedDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            wrapper.title = `Viewing: ${formattedDate} (Tap to reset)`;
        }
    };

</script>
