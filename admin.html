<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | GC Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #09090b; --card: #141415; --border: #27272a;
        --text: #f4f4f5; --muted: #a1a1aa; --accent: #3b82f6;
        --green: #10b981; --red: #ef4444;
    }
    body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .admin-container { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .logo { font-weight: 800; font-size: 24px; margin-bottom: 30px; letter-spacing: 0.5px; }
    .logo span { color: var(--accent); }
    
    .status-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 13px; color: var(--muted); }
    
    .btn { display: block; width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; border: none; text-decoration: none; box-sizing: border-box; }
    
    .btn-google { background: white; color: #000; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .btn-google:hover { background: #f4f4f5; }
    
    .btn-upstox { background: #5a2e8d; color: white; display: none; }
    .btn-upstox:hover { background: #4a2475; }
    
    .btn-download { background: var(--green); color: white; display: none; }
    .btn-download:hover { background: #059669; }

    .btn-logout { background: transparent; color: var(--muted); border: 1px solid var(--border); display: none; margin-top: 30px; }
    .btn-logout:hover { background: rgba(239, 68, 68, 0.1); color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<div class="admin-container">
    <div class="logo"><span>GC</span> Command Center</div>
    
    <div class="status-box" id="status-box">
        Waiting for authentication...
    </div>

    <button class="btn btn-google" id="btn-login" onclick="window.handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
        Admin Sign In
    </button>

    <a href="https://ioc-backend-kq9x.onrender.com/login" class="btn btn-upstox" id="btn-upstox">1. Authorize Upstox Server</a>
    
    <button class="btn btn-download" id="btn-download" onclick="downloadArchive()">2. Download Monthly Data</button>
    
    <button class="btn btn-logout" id="btn-logout" onclick="window.logoutFirebase()">Log Out</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, getIdToken, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXycONZBbhKBo__PtazbQXJR9n44dmoGo",
    authDomain: "insideoptionchain.firebaseapp.com",
    projectId: "insideoptionchain",
    storageBucket: "insideoptionchain.firebasestorage.app",
    messagingSenderId: "112098245685",
    appId: "1:112098245685:web:e3d15aca5d370a3fc4057c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  window.currentFirebaseToken = null; 

  onAuthStateChanged(auth, async (user) => {
    const statusBox = document.getElementById('status-box');
    
    if (user) {
      window.currentFirebaseToken = await getIdToken(user);
      
      // 🔴 Replace with your exact UID to lock out everyone else
      if (user.uid === "VEbfwlnqrDgy6QoFnN6Bf6qWdr72") {
          statusBox.innerHTML = `<span style="color:var(--green)">Access Granted.</span><br>Welcome, Admin.`;
          document.getElementById('btn-login').style.display = 'none';
          document.getElementById('btn-upstox').style.display = 'block';
          document.getElementById('btn-download').style.display = 'block';
          document.getElementById('btn-logout').style.display = 'block';
      } else {
          statusBox.innerHTML = `<span style="color:var(--red)">Access Denied.</span><br>You are not an administrator.`;
          document.getElementById('btn-login').style.display = 'none';
          document.getElementById('btn-logout').style.display = 'block';
      }
    } else {
      statusBox.innerHTML = `System locked. Please authenticate.`;
      document.getElementById('btn-login').style.display = 'flex';
      document.getElementById('btn-upstox').style.display = 'none';
      document.getElementById('btn-download').style.display = 'none';
      document.getElementById('btn-logout').style.display = 'none';
    }
  });

  window.handleGoogleLogin = async function() {
      try { await signInWithPopup(auth, googleProvider); } 
      catch(err) { alert(err.message); }
  };

  window.logoutFirebase = function() {
      signOut(auth);
  };

  window.downloadArchive = async function() {
      if (!window.currentFirebaseToken) return;
      
      const btn = document.getElementById('btn-download');
      btn.innerText = "Extracting Data...";
      btn.style.opacity = "0.7";
      
      try {
          const response = await fetch('https://ioc-backend-kq9x.onrender.com/api/admin/download-archive', {
              headers: { 'Authorization': `Bearer ${window.currentFirebaseToken}` }
          });
          
          if (!response.ok) throw new Error("Unauthorized or server failed");
          
          // Convert the response to a downloadable blob
          const blob = await response.blob();
          const downloadUrl = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = `Options_Archive_${new Date().toISOString().split('T')[0]}.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(downloadUrl);
          
          btn.innerText = "Download Successful!";
          setTimeout(() => { btn.innerText = "2. Download Monthly Data"; btn.style.opacity = "1"; }, 3000);
          
      } catch (e) {
          alert("Download failed: " + e.message);
          btn.innerText = "2. Download Monthly Data";
          btn.style.opacity = "1";
      }
  };
</script>
</body>
</html>
