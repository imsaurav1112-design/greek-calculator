<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | GC Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #09090b; --card: #141415; --section: #202023; --border: #27272a;
        --text: #f4f4f5; --muted: #a1a1aa; --accent: #3b82f6;
        --green: #10b981; --red: #ef4444; --gold: #f59e0b;
    }
    body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }
    
    /* LOGIN SCREEN */
    #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .login-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .logo { font-weight: 800; font-size: 24px; margin-bottom: 30px; letter-spacing: 0.5px; }
    .logo span { color: var(--accent); }
    .status-box { background: var(--section); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 13px; color: var(--muted); }
    .btn-google { background: white; color: #000; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; padding: 14px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: 0.2s; }
    .btn-google:hover { background: #f4f4f5; }

    /* DASHBOARD LAYOUT */
    #dashboard-screen { display: none; width: 100vw; height: 100vh; }
    .sidebar { width: 250px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
    .sidebar-header { padding: 0 20px 30px 20px; font-weight: 800; font-size: 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .sidebar-header span { color: var(--accent); }
    .nav-item { padding: 12px 20px; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; border-left: 3px solid transparent; }
    .nav-item:hover { background: var(--section); color: var(--text); }
    .nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border-left-color: var(--accent); }
    .logout-nav { margin-top: auto; color: var(--red); }
    .logout-nav:hover { background: rgba(239, 68, 68, 0.1); }

    .main-content { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg); }
    .header-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; margin-top: 0; }
    
    /* TAB CONTENT */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* KPI CARDS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; }
    .kpi-title { font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
    .kpi-value { font-size: 32px; font-weight: 800; font-family: 'Ubuntu Mono', monospace; }

    /* TABLES */
    .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    th { background: var(--section); padding: 12px 20px; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 15px 20px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: var(--section); }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge.pro { background: rgba(16, 185, 129, 0.1); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge.free { background: rgba(161, 161, 170, 0.1); color: var(--muted); border: 1px solid rgba(161, 161, 170, 0.3); }
    
    .action-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s; margin-right: 5px; font-weight: 600;}
    .action-btn:hover { background: var(--accent); border-color: var(--accent); color: white;}

    /* MODAL STYLES */
    .auth-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
    .auth-modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    .auth-close { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: var(--muted); font-size: 24px; cursor: pointer; transition: 0.2s; line-height: 1; }
    .auth-close:hover { color: var(--red); }
    .auth-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; font-family: 'Poppins', sans-serif; font-size: 14px; }
    .auth-input:focus { outline: none; border-color: var(--accent); }
    .btn-primary { background: var(--accent); border: none; color: #fff; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: 0.2s;}
    .btn-primary:hover { background: #2563eb; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="logo"><span>GC</span> Command Center</div>
        <div class="status-box" id="status-box">Waiting for authentication...</div>
        <button class="btn-google" id="btn-login" onclick="window.handleGoogleLogin()">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
            Admin Sign In
        </button>
    </div>
</div>

<div id="dashboard-screen">
    <div class="sidebar">
        <div class="sidebar-header"><span>GC</span> Admin</div>
        <div class="nav-item active" onclick="switchTab('tab-overview', this)">Overview</div>
        <div class="nav-item" onclick="switchTab('tab-users', this)">User Management</div>
        <div class="nav-item logout-nav" onclick="window.logoutFirebase()">Log Out Securely</div>
    </div>

    <div class="main-content">
        <div id="tab-overview" class="tab-pane active">
            <h1 class="header-title">Platform Overview</h1>
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-title">Total Registered Users</div>
                    <div class="kpi-value" id="kpi-total" style="color: var(--accent);">--</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">Active Pro Subscriptions</div>
                    <div class="kpi-value" id="kpi-pro" style="color: var(--green);">--</div>
                </div>
            </div>
        </div>

        <div id="tab-users" class="tab-pane">
            <h1 class="header-title">User Management</h1>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Expiry Date</th>
                            <th>Wallet Balance</th>
                            <th>Ref Code</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr><td colspan="6" style="text-align:center; color:var(--muted);">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="edit-modal" class="auth-overlay">
    <div class="auth-modal">
        <button class="auth-close" onclick="closeEditModal()">&times;</button>
        <h3 style="margin-top:0;">Edit User</h3>
        <p id="edit-user-email" style="color: var(--accent); font-weight: 600; font-size: 14px; margin-bottom: 20px; word-break: break-all;"></p>
        
        <input type="hidden" id="edit-uid">
        
        <label style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px;">Subscription Tier</label>
        <select id="edit-tier" class="auth-input">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
        </select>
        
        <label style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px;">Wallet Balance (₹)</label>
        <input type="number" id="edit-wallet" class="auth-input" step="0.01">
        
        <label style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px;">Expiry Date (YYYY-MM-DD HH:MM:SS)</label>
        <input type="text" id="edit-expiry" class="auth-input" placeholder="e.g. 2026-12-31 23:59:59">
        
        <button class="btn-primary" style="width: 100%;" onclick="saveUserChanges()">Save Changes</button>
        <p id="edit-error" style="color:var(--red); font-size:13px; text-align:center; margin-top:15px; display:none;"></p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, getIdToken, signOut, GoogleAuthProvider, signInWithRedirect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCXycONZBbhKBo__PtazbQXJR9n44dmoGo",
    authDomain: "insideoptionchain.firebaseapp.com",
    projectId: "insideoptionchain",
    storageBucket: "insideoptionchain.firebasestorage.app",
    messagingSenderId: "112098245685",
    appId: "1:112098245685:web:e3d15aca5d370a3fc4057c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  window.currentFirebaseToken = null; 
  window.globalUsers = []; // Store fetched users globally

  onAuthStateChanged(auth, async (user) => {
    const statusBox = document.getElementById('status-box');
    
    if (user) {
      window.currentFirebaseToken = await getIdToken(user);
      
      // 🔴 Replace with your exact UID to lock out everyone else
      if (user.uid === "VEbfwlnqrDgy6QoFnN6Bf6qWdr72") {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard-screen').style.display = 'flex';
          loadAdminData(); 
      } else {
          statusBox.innerHTML = `<span style="color:var(--red)">Access Denied.</span><br>You are not an administrator.`;
          document.getElementById('btn-login').style.display = 'none';
          setTimeout(() => signOut(auth), 3000);
      }
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard-screen').style.display = 'none';
      statusBox.innerHTML = `System locked. Please authenticate.`;
      document.getElementById('btn-login').style.display = 'flex';
    }
  });

  window.handleGoogleLogin = function() {
      const btn = document.getElementById('btn-login');
      if (btn) btn.innerText = "Redirecting to Google...";
      signInWithRedirect(auth, googleProvider);
  };

  window.logoutFirebase = function() {
      signOut(auth);
  };

  window.switchTab = function(tabId, element) {
      document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      element.classList.add('active');
  };

  // 🟢 FETCH DATA FROM SQLITE
  window.loadAdminData = async function() {
      if (!window.currentFirebaseToken) return;
      const headers = { 'Authorization': `Bearer ${window.currentFirebaseToken}` };
      
      try {
          const userRes = await fetch('https://api.greekcalculator.in/api/admin/all-users', { headers });
          if (userRes.ok) {
              const userData = await userRes.json();
              window.globalUsers = userData.users; // Save for modal
              const tbody = document.getElementById('user-table-body');
              
              if (window.globalUsers.length === 0) {
                  tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--muted);">No users found.</td></tr>`;
              } else {
                  // Update top KPIs
                  document.getElementById('kpi-total').innerText = window.globalUsers.length;
                  document.getElementById('kpi-pro').innerText = window.globalUsers.filter(u => u.tier === 'pro').length;
                  
                  // Build Table
                  tbody.innerHTML = window.globalUsers.map(u => `
                      <tr>
                          <td>${u.email || 'Unknown'}</td>
                          <td><span class="badge ${u.tier === 'pro' ? 'pro' : 'free'}">${u.tier || 'free'}</span></td>
                          <td>${u.expiry || '--'}</td>
                          <td style="font-family:'Ubuntu Mono';">₹${parseFloat(u.wallet_balance || 0).toFixed(2)}</td>
                          <td style="font-family:'Ubuntu Mono'; color:var(--muted);">${u.referral_code || '--'}</td>
                          <td>
                              <button class="action-btn" onclick="openEditModal('${u.uid}')">Edit User</button>
                          </td>
                      </tr>
                  `).join('');
              }
          }
      } catch (err) {
          console.error("Admin Fetch Error:", err);
      }
  };

  // 🟢 MODAL LOGIC
  window.openEditModal = function(uid) {
      const user = window.globalUsers.find(u => u.uid === uid);
      if (!user) return;

      document.getElementById('edit-uid').value = user.uid;
      document.getElementById('edit-user-email').innerText = user.email;
      document.getElementById('edit-tier').value = user.tier || 'free';
      document.getElementById('edit-wallet').value = parseFloat(user.wallet_balance || 0).toFixed(2);
      document.getElementById('edit-expiry').value = user.expiry || '';
      
      document.getElementById('edit-error').style.display = 'none';
      document.getElementById('edit-modal').style.display = 'flex';
  };

  window.closeEditModal = function() {
      document.getElementById('edit-modal').style.display = 'none';
  };

  window.saveUserChanges = async function() {
      const uid = document.getElementById('edit-uid').value;
      const tier = document.getElementById('edit-tier').value;
      const wallet = document.getElementById('edit-wallet').value;
      const expiry = document.getElementById('edit-expiry').value;
      const errBox = document.getElementById('edit-error');
      
      try {
          const res = await fetch('https://api.greekcalculator.in/api/admin/update-user', {
              method: 'POST',
              headers: { 
                  'Authorization': `Bearer ${window.currentFirebaseToken}`,
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                  target_uid: uid,
                  tier: tier,
                  wallet_balance: parseFloat(wallet),
                  expiry: expiry || null
              })
          });
          
          const data = await res.json();
          if (res.ok) {
              closeEditModal();
              loadAdminData(); // Refresh the table
          } else {
              errBox.innerText = data.error || "Failed to update user.";
              errBox.style.display = 'block';
          }
      } catch (err) {
          errBox.innerText = "Network error. Try again.";
          errBox.style.display = 'block';
      }
  };
</script>
</body>
</html>
