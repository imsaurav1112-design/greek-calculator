<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GC | Live</title>
<link rel="icon" type="image/png" href="optionchain_fevicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg: #09090b;         
  --card: #141415;       
  --section: #202023;    
  --border: #27272a;     
  --text: #f4f4f5;       
  --muted: #a1a1aa;      
  --accent: #3b82f6;     
  --accent-glow: rgba(59, 130, 246, 0.4);
  --gold: #f59e0b;         
  --green: #10b981;        
  --red: #ef4444;          
  --itm-ce: #0e1411;       
  --itm-pe: #161011;       
}

.light-theme {
  --bg: #f8fafc; 
  --card: #ffffff; 
  --section: #f1f5f9; 
  --border: #e2e8f0;
  --text: #0f172a; 
  --muted: #64748b; 
  --itm-ce: #f0fdf4; 
  --itm-pe: #fef2f2;
  --accent: #2563eb;
}

body { 
    margin: 0; 
    font-family: 'Poppins', sans-serif; 
    background-color: var(--bg); 
    color: var(--text); 
    display: flex; 
    flex-direction: column; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; 
}
header { 
    height: 52px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; gap: 12px; transition: background-color 0.3s, border-color 0.3s;
}

.logo { text-decoration: none; font-weight: 800; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid var(--border);letter-spacing: 0.5px; white-space: nowrap;}
  .logo span { color: var(--accent); }
.divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; flex-shrink: 0;}

header select, header button { 
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 12px; cursor: pointer; transition: all 0.2s ease; outline: none; flex-shrink: 0;
}

header button.primary-btn { background: var(--accent); color: #fff; font-weight: 600; border: none; }
header button.primary-btn:hover { background: #2563eb; box-shadow: 0 0 10px var(--accent-glow); border: none;}

/* Ticker Tape Styles */
.ticker-wrap {
    width: 100%;
    overflow: hidden;
    background-color: #09090b;
    border-bottom: 1px solid var(--border);
    height: 20px;
    display: flex;
    align-items: center;
    box-sizing: border-box;
    white-space: nowrap;
    flex-shrink: 0;
}

.ticker-content {
    display: inline-block;
    white-space: nowrap;
    animation: ticker-scroll 30s linear infinite;
}

.ticker-content:hover {
    animation-play-state: paused;
}

.ticker-item {
    display: inline-block;
    padding: 0 1.5rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    font-weight: bold;
    color: var(--muted);
    line-height: 20px;
}

.ticker-price {
    margin-left: 8px;
}

.tick-up { color: var(--green); }   
.tick-down { color: var(--red); } 

@keyframes ticker-scroll {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); } 
}

/* 🟢 Centered Header Stats */
.header-center-info {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--bg);
    padding: 4px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    pointer-events: none;
}

.info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
}

.info-item .label {
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
}

.info-item b {
    font-family: 'Ubuntu Mono', monospace;
    font-size: 13px;
    color: var(--accent);
}

.info-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
}

@media (max-width: 768px) {
    .header-center-info { display: none; }
}

.custom-dropdown-wrapper { position:static !important; display: flex; align-items: center; flex-shrink: 0;}
.custom-menu {
    display: none; position: absolute; left: 0; top: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 0; z-index: 1000; min-width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); flex-direction: column; margin-top: 8px;
}
.light-theme .custom-menu { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.custom-option {
    display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; transition: 0.15s; font-family: "Ubuntu Mono", monospace; font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap;
}
.custom-option:hover { background: var(--section); color: var(--text); }
.custom-option input { margin: 0; accent-color: var(--accent); }

.left-nav {
    width: 52px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 16px; gap: 16px; flex-shrink: 0; z-index: 20; position: relative;
}

.nav-btn { width: 36px; height: 36px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; position: relative; }
.nav-btn:hover { background: var(--section); color: var(--text); border: 1px solid var(--border); }
.nav-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent); }

/* Settings Panel logic */
.settings-panel {
    display: none; 
    position: absolute; 
    left: 60px; 
    top: -50px; 
    background: var(--card); 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    width: 190px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
    flex-direction: column; 
    z-index: 9999; 
    
    max-height: 65vh !important;
    overflow-y: auto !important; 
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch; 
}

.settings-panel > * {
    flex-shrink: 0 !important;
}

.settings-panel::-webkit-scrollbar { width: 5px; }
.settings-panel::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 5px; }

.light-theme .settings-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.settings-header { padding: 10px 16px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--section); }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.15s;}
.settings-row:hover { background: var(--section); }
.settings-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
.settings-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-size: 11px; font-family: 'Poppins', sans-serif; cursor: pointer; outline: none; }

.workspace { 
    flex: 1; display: flex; overflow: hidden; position: relative; background: var(--bg); min-height: 0; 
}

.table-wrapper { 
    flex: 1; overflow: auto; position: relative; -webkit-overflow-scrolling: touch; min-height: 0; 
}
table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; table-layout: auto; }
th { background: rgba(0, 0, 0, 0.3); padding: 10px 4px; color: #fafafc; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); font-weight: 600; font-size: 11px; position: sticky; top: 0; z-index: 10; letter-spacing: 0.5px;}
.light-theme th { background-color: var(--red); color: var(--text); }
th.strike-cell { background: #1e293b !important; color: #f8fafc !important; border-bottom: 1px solid var(--accent); }
.light-theme th.strike-cell { background: #cbd5e1 !important; color: var(--text) !important; }

th.ce-header { background-color: var(--red) !important; color: #fff !important; border-bottom: 1px solid rgba(239, 68, 68, 0.3) !important; }
th.pe-header { background-color: var(--green) !important; color: #fff !important; border-bottom: 1px solid rgba(16, 185, 129, 0.3) !important; }
.light-theme th.ce-header { background-color: var(--red) !important; color: #fff !important; }
.light-theme th.pe-header { background-color: var(--green) !important; color: #fff !important; }

tr { height: 38px; border-bottom: 1px solid var(--border); transition: background 0.1s;}
tr:hover { background: var(--section) !important; }
td { padding: 0 4px; border-right: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text); vertical-align: middle;}
td:last-child { border-right: none; }

.val-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.1; }
.spot-line td { border: none !important; position: relative; height: 28px; background: transparent !important; }
.spot-divider { display: flex; align-items: center; justify-content: center; width: 100%; height: 1px; background: var(--accent); position: absolute; top: 50%; transform: translateY(-50%); z-index: 5; box-shadow: 0 0 10px var(--accent-glow);}
.spot-divider span { background: var(--bg); color: var(--accent); padding: 4px 12px; font-size: 11px; font-weight: 700; border-radius: 20px; border: 1px solid var(--accent); letter-spacing: 0.5px; z-index: 6; font-family: 'Poppins', sans-serif; box-shadow: 0 0 10px var(--accent-glow);}

.itm-ce { background-color: var(--itm-ce); }
.itm-pe { background-color: var(--itm-pe); }

.max-ce-heat { background-color: var(--red) !important; color: #fff !important; font-weight: 800 !important; }
.max-pe-heat { background-color: var(--green) !important; color: #fff !important; font-weight: 800 !important; }
.heat-2nd { background-color: var(--gold) !important; color: #000 !important; font-weight: 800 !important; }
.heat-75 { background-color: #3f3f46 !important; color: #fff !important; font-weight: 600 !important; }
.light-theme .heat-75 { background-color: #cbd5e1 !important; color: #000 !important; }
.pct-tag { font-size: 9px; color: var(--accent); background: rgba(59, 130, 246, 0.1); padding: 2px 6px; border-radius: 4px; margin-top: 2px; display: inline-block; font-weight: 700; border: 1px solid rgba(59, 130, 246, 0.2);}

td.strike-cell { color: var(--text); font-weight: 700; background: #1e293b !important; border-left: 1px solid var(--border); border-right: 1px solid var(--border); transition: 0.2s;}
.light-theme td.strike-cell { background: #f1f5f9 !important; color: var(--text) !important; }
td.strike-cell:hover { background: rgba(59, 130, 246, 0.2) !important; color: var(--accent) !important; box-shadow: inset 0 0 10px var(--accent-glow); cursor: pointer; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
.modal-content { 
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 1000px; padding: 24px; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.9); display: flex; flex-direction: column; gap: 20px; 
    max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; 
}
.modal-content::-webkit-scrollbar { width: 6px; }
.modal-content::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 6px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: transparent; color: var(--muted); border: none; font-size: 20px; cursor: pointer; transition: 0.2s; }
.modal-close:hover { color: var(--red); transform: scale(1.1); }
.modal-header { text-align: center; font-family: "Ubuntu Mono", monospace; font-size: 18px; font-weight: 800; color: var(--text); margin: 0;}
.modal-header span { color: var(--accent); }

.charts-container { display: flex; justify-content: space-between; gap: 20px; height: 300px;}
.chart-box { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; position: relative; }

.chart-sidebar { position: relative; width: 0px; height: 100%; background: #131722; border-left: 1px solid #2a2e39; display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; flex-shrink: 0; }
.chart-sidebar.open { width: 340px; }
.chart-sidebar .resizer { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; background: transparent; z-index: 50; transition: background 0.2s; }
.chart-sidebar .resizer:hover { background: var(--accent); }
.chart-toolbar { display: flex; align-items: center; flex-wrap: nowrap; gap: 4px; padding: 6px 8px; background: #131722; border-bottom: 1px solid #2a2e39; overflow-x: auto; }
.chart-toolbar::-webkit-scrollbar { height: 0px; }

.chart-btn { background: transparent; color: #b2b5be; border: 1px solid transparent; padding: 4px 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 4px; font-family: 'Poppins', sans-serif; transition: 0.15s; white-space: nowrap; }
.chart-btn:hover { background: #2a2e39; color: #d1d4dc; }
